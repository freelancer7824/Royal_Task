<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Mining Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons Icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Premium Color Palette & Global Variables --- */
        :root {
            --bg-dark: #090a0f;
            --panel-dark: #121420;
            --accent-glow: #00ffcc;
            --accent-hover: #00b38f;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --border-color: rgba(255, 255, 255, 0.05);
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none; /* Anti-copy protection */
            user-select: none;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        /* --- Top Navbar --- */
        .topnav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: rgba(18, 20, 32, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Mobile Menu Toggle (Hamburger) */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            z-index: 1100;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i {
            font-size: 24px;
            color: var(--accent-glow);
            -webkit-text-fill-color: initial; 
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Premium Login Button Layout */
        .login-btn {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 22px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-btn i {
            font-size: 14px;
            color: var(--accent-glow);
            transition: transform 0.3s ease;
        }

        .login-btn:hover {
            background: var(--text-main);
            color: #000;
            border-color: var(--text-main);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
        }
        
        .login-btn:hover i {
            color: #000;
            transform: translateX(3px);
        }

        /* Profile Icon Button */
        .profile-icon-btn {
            display: none; /* Hidden by default */
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 255, 204, 0.05);
            border: 1.5px solid rgba(0, 255, 204, 0.2);
            color: var(--accent-glow);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .profile-icon-btn:hover {
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            transform: scale(1.05);
        }

        /* --- Toast Notification System --- */
        #toastContainer {
            position: fixed;
            top: 85px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast-msg {
            background: rgba(18, 20, 32, 0.95);
            border: 1px solid rgba(0, 255, 204, 0.2);
            color: var(--text-main);
            padding: 16px 22px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 14px;
            transform: translateX(120%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 280px;
            backdrop-filter: blur(10px);
        }

        .toast-msg.show { 
            transform: translateX(0); 
        }

        .toast-msg i { 
            font-size: 20px; 
            color: var(--accent-glow); 
        }

        .toast-text-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .toast-title {
            font-size: 14px;
            font-weight: 600;
        }

        .toast-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- Main Layout Wrapper --- */
        .main-wrapper {
            display: flex;
            margin-top: 70px;
            height: calc(100% - 70px);
            position: relative;
        }

        /* --- Left Sidebar Panel --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--panel-dark);
            height: 100%;
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 18px 0 8px 0;
            padding-left: 12px;
            font-weight: 600;
        }
        
        .sidebar-title:first-child {
            margin-top: 0;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            padding: 14px 16px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            gap: 14px;
        }

        .sidebar a i {
            font-size: 18px;
            width: 24px; 
            text-align: center;
            transition: all 0.3s ease;
        }

        .sidebar a:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        .sidebar a:hover i {
            color: var(--text-main);
        }

        .sidebar a.active {
            background: linear-gradient(90deg, rgba(0, 255, 204, 0.08) 0%, rgba(0, 255, 204, 0) 100%);
            color: var(--accent-glow);
            font-weight: 600;
            border-left: 3px solid var(--accent-glow);
            border-radius: 0 12px 12px 0; 
        }
        
        .sidebar a.active i {
            color: var(--accent-glow);
        }

        /* --- Content Dashboard Panel --- */
        .content-container {
            flex-grow: 1;
            height: 100%;
            background-color: var(--bg-dark);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }

        /* Mobile Backdrop Overlay Blur */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 90;
        }

        /* --- RESPONSIVE CSS STYLING --- */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex; 
            }

            .sidebar {
                position: fixed;
                left: calc(-1 * var(--sidebar-width)); 
                top: 70px;
                height: calc(100% - 70px);
                box-shadow: 15px 0 40px rgba(0,0,0,0.6);
            }

            .sidebar.active {
                left: 0; 
            }

            .sidebar-overlay.show {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .login-btn {
                padding: 8px 14px;
                font-size: 13px;
                border-radius: 8px;
            }
            .logo {
                font-size: 18px;
            }
            .logo i {
                font-size: 20px;
            }
            .toast-msg {
                min-width: 240px;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Toast Notification Container -->
    <div id="toastContainer"></div>

    <!-- Top Navbar Section -->
    <header class="topnav">
        <div class="nav-left">
            <button class="menu-toggle" id="menuBtn" aria-label="Toggle Navigation">
                <i class="fa-solid fa-bars" id="toggleIcon"></i>
            </button>
            <div class="logo">
                <i class="fa-solid fa-cubes-stacked"></i>
                ROYAL TASK
            </div>
        </div>
        <div class="nav-actions">
            <!-- Sign In Button -->
            <button class="login-btn" id="signInBtn">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
            
            <!-- Profile Icon (Shown when logged in) -->
            <button class="profile-icon-btn" id="profileBtn" title="My Profile">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
    </header>

    <!-- Main Container Dynamic Dashboard Core -->
    <div class="main-wrapper">
        
        <!-- Mobile Sidebar Backdrop Overlay -->
        <div class="sidebar-overlay" id="overlay"></div>

        <!-- Left Sidebar Navigation Framework -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-title">Core Features</div>
            <a class="nav-link active" data-url="../User/dashboard">
    <i class="fa-solid fa-gauge-high"></i> Dashboard
</a>

<a class="nav-link" data-url="../User/vip-level-up">
    <i class="fa-solid fa-crown"></i> Vip Level Up
</a>

<a class="nav-link" data-url="../User/referrals">
    <i class="fa-solid fa-users"></i> Referrals
</a>

<a class="nav-link" data-url="../User/deposit">
    <i class="fa-solid fa-money-bill-wave"></i> Deposit
</a>

<a class="nav-link" data-url="../User/deposit-history">
    <i class="fa-solid fa-clock-rotate-left"></i> Deposit History
</a>

<a class="nav-link" data-url="../User/withdrawal">
    <i class="fa-solid fa-wallet"></i> Withdrawal
</a>

<a class="nav-link" data-url="../User/withdraw-history">
    <i class="fa-solid fa-file-invoice-dollar"></i> Withdraw History
</a>
            
            <div class="sidebar-title">Support</div>
            <a class="nav-link" data-url="../User/profile">
                <i class="fa-solid fa-user-gear"></i>Settings
            </a>
        </nav>

        <!-- Main Content (Iframe Area) -->
        <main class="content-container">
            <iframe id="main-frame" src="homepage" name="main-frame"></iframe>
        </main>
    </div>

    <!-- Firebase SDKs (Compat version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Your Custom Config File -->
    <script src="config.js"></script>

    <script>
        // ========================================
        // 1. FIREBASE INITIALIZATION & AUTH STATE
        // ========================================
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let isUserLoggedIn = false;

        // --- Function to Update UI based on Login Status ---
        function updateUI(isLoggedIn) {
            if (isLoggedIn) {
                document.getElementById('signInBtn').style.display = 'none';
                document.getElementById('profileBtn').style.display = 'flex';
            } else {
                document.getElementById('signInBtn').style.display = 'flex';
                document.getElementById('profileBtn').style.display = 'none';
            }
        }

        // --- Check LocalStorage on Page Load (Restore Session) ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('currentUser');
            
            if (savedUser) {
                // লোকাল স্টোরেজে ইউজার ডাটা পাওয়া গেছে
                try {
                    const userData = JSON.parse(savedUser);
                    // ইউজার অথেন্টিকেটেড আছে কিনা আরেকবার সার্ভার থেকে ভেরিফাই করার চেষ্টা করবে (অপশনাল)
                    // তবে দ্রুত UI লোড করার জন্য আমরা লোকাল স্টোরেজ ডাটাকেই প্রায়োরিটি দিচ্ছি
                    isUserLoggedIn = true;
                    updateUI(true);
                    
                    // Firebase Auth State যদি পিছিয়ে থাকে, তাও সিঙ্ক করার চেষ্টা করবে
                    auth.onAuthStateChanged((user) => {
                        if (!user) {
                            // ফায়ারবেসে সেশন নেই কিন্তু লোকাল স্টোরেজে আছে (টোকেন এক্সপায়ার্ড হয়ে যেতে পারে)
                            // তাই লোকাল স্টোরেজ ক্লিয়ার করে লগআউট করা ভালো
                            handleLogout(); 
                        }
                    });

                } catch (e) {
                    console.error("Local storage parse error", e);
                    localStorage.removeItem('currentUser');
                    updateUI(false);
                }
            } else {
                // লোকাল স্টোরেজে ডাটা নেই, Firebase Auth চেক করবে
                auth.onAuthStateChanged(user => {
                    if (user) {
                        // Firebase Auth এ আছে, তাই localStorage এ সেভ করবে
                        saveUserToLocalStorage(user);
                        isUserLoggedIn = true;
                        updateUI(true);
                    } else {
                        isUserLoggedIn = false;
                        updateUI(false);
                    }
                });
            }
        });

        // --- Function to Save User Data to LocalStorage ---
        function saveUserToLocalStorage(user) {
            const userData = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || "User",
                photoURL: user.photoURL || null
            };
            localStorage.setItem('currentUser', JSON.stringify(userData));
        }

        // --- Function to Handle Logout ---
        function handleLogout() {
            auth.signOut().then(() => {
                localStorage.removeItem('currentUser');
                isUserLoggedIn = false;
                updateUI(false);
                // ইউজারকে লগইন পেজে রিডাইরেক্ট করতে চাইলে নিচের লাইনটি এক্টিভ করুন
                // window.location.href = 'login.html'; 
                
                // অথবা হোমপেজে ফিরিয়ে দিন
                document.getElementById('main-frame').src = 'homepage';
            }).catch((error) => {
                console.error("Sign out error", error);
            });
        }
        
        // প্রোফাইল বাটন ক্লিক করলে লগআউট অপশন যোগ করা যেতে পারে (অপশনাল)
        // এখানে আমি প্রোফাইল বাটনে ক্লিক করলে প্রোফাইল পেজ লোড করছি, তবে সেখানে লগআউট বাটন থাকবে
        document.getElementById('profileBtn').addEventListener('click', () => {
             document.getElementById('main-frame').src = 'profile';
        });


        // ========================================
        // 2. TOAST NOTIFICATION SYSTEM
        // ========================================
        function showToast(title, subtitle, iconClass) {
            const container = document.getElementById('toastContainer');
            
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerHTML = `
                <i class="${iconClass}"></i>
                <div class="toast-text-container">
                    <div class="toast-title">${title}</div>
                    <div class="toast-subtitle">${subtitle}</div>
                </div>
            `;
            
            container.appendChild(toast);

            // Trigger slide-in animation
            setTimeout(() => toast.classList.add('show'), 50);

            // Auto remove after 3.5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                // Remove from DOM after transition ends
                setTimeout(() => toast.remove(), 500);
            }, 3500);
        }

        // ========================================
        // 3. NAVIGATION & AUTH LOGIC
        // ========================================
        const links = document.querySelectorAll('.nav-link');
        const iframe = document.getElementById('main-frame');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menuBtn');
        const toggleIcon = document.getElementById('toggleIcon');
        const signInBtn = document.getElementById('signInBtn');

        // Sidebar Navigation Click Handler
        links.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); // Prevent default jump

                // If user is not logged in, show toast and block navigation
                if (!isUserLoggedIn) {
                    showToast("Access Restricted", "Please sign in to continue", "fa-solid fa-lock");
                    if(window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                        toggleSidebar(); // Close mobile menu
                    }
                    return;
                }

                // If logged in, allow navigation
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                const targetUrl = this.getAttribute('data-url');
                iframe.src = targetUrl;

                // Auto collapse navigation panel when mobile size triggers active navigation 
                if(window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });

        // Sign In Button Click Handler -> Load login.html in iframe
        signInBtn.addEventListener('click', () => {
            iframe.src = '../User/login';
        });

        // ========================================
        // 4. MOBILE VIEW NAVIGATION TOGGLER
        // ========================================
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('show');
            
            if(sidebar.classList.contains('active')) {
                toggleIcon.className = "fa-solid fa-xmark";
            } else {
                toggleIcon.className = "fa-solid fa-bars";
            }
        }

        menuBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // ========================================
        // 5. SECURITY & PROTECTION CODE
        // ========================================
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
</body>
</html>
