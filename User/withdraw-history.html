<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #090a0f;
            --panel-card: #121420;
            --accent-neon: #00ffcc;
            --accent-danger: #ff5252;
            --accent-warning: #ffcc00;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --card-border: rgba(255, 255, 255, 0.03);
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            padding: 24px; 
            margin: 0;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
        }
        
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 5px; }
        .page-header p { color: var(--text-muted); }
        
        .history-card {
            background: linear-gradient(145deg, #121420 0%, #0e1019 100%);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            width: 100%; 
            box-sizing: border-box; 
            overflow-x: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 780px; }
        th { text-align: left; color: var(--text-muted); font-size: 13px; padding: 16px; border-bottom: 1px solid var(--card-border); text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 16px; font-size: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.02); vertical-align: top; }
        
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255, 255, 255, 0.02); }

        .amount-text { color: var(--accent-neon); font-weight: 600; font-family: monospace; }
        .fee-text { color: var(--text-muted); font-family: monospace; font-size: 13px; }
        
        /* --- Status Pills --- */
        .status-pill { 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px;
            cursor: default;
            position: relative;
        }
        .status-pending { background: rgba(255, 204, 0, 0.1); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.2); }
        .status-approved { background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid rgba(0, 255, 204, 0.2); }
        .status-rejected { 
            background: rgba(255, 82, 82, 0.1); 
            color: #ff5252; 
            border: 1px solid rgba(255, 82, 82, 0.2); 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .status-rejected:hover {
            background: rgba(255, 82, 82, 0.22);
            border-color: rgba(255, 82, 82, 0.45);
            box-shadow: 0 0 14px rgba(255, 82, 82, 0.18);
        }
        .status-rejected .pulse-dot {
            width: 5px; height: 5px;
            background: #ff5252;
            border-radius: 50%;
            display: inline-block;
            animation: pulseDot 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        .status-rejected .eye-icon {
            font-size: 9px;
            opacity: 0.4;
            transition: opacity 0.2s;
            margin-left: 1px;
        }
        .status-rejected:hover .eye-icon {
            opacity: 1;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.6); }
        }

        /* --- Wallet Text --- */
        .wallet-text {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.02);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .wallet-text:hover {
            color: var(--accent-neon);
            background: rgba(0, 255, 204, 0.05);
        }

        /* --- Reason Tooltip (Status এর উপরে ভাসবে) --- */
        .reason-tooltip {
            display: none;
            position: absolute;
            left: 0;
            bottom: calc(100% + 12px);
            background: #1a1e30;
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            min-width: 280px;
            max-width: 380px;
            z-index: 200;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65), 0 0 20px rgba(255, 82, 82, 0.08);
            animation: tooltipIn 0.22s ease;
            text-align: left;
        }
        .reason-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 24px;
            border: 7px solid transparent;
            border-top-color: rgba(255, 82, 82, 0.3);
        }
        .reason-tooltip.show {
            display: block;
        }
        .reason-tooltip .rt-header {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #ff5252;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .reason-tooltip .rt-header i {
            font-size: 11px;
        }
        .reason-tooltip .rt-body {
            font-size: 12.5px;
            color: #d0d0d8;
            line-height: 1.6;
            font-weight: 400;
        }
        @keyframes tooltipIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Note Column Cell --- */
        .note-cell {
            max-width: 0;
            padding: 0 !important;
            border: none !important;
            overflow: hidden;
            transition: none;
        }

        /* --- Toast --- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1d30;
            border: 1px solid rgba(0, 255, 204, 0.2);
            color: var(--accent-neon);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 1100;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 22px; }
            th, td { padding: 12px; font-size: 13px; }
            .history-card { padding: 15px; }
            .reason-tooltip { min-width: 220px; max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1>Withdrawal History</h1>
            <p>Track your outbound transfer requests and settlement statuses.</p>
        </div>

        <div class="history-card">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Network</th>
                        <th>Target Wallet</th>
                        <th>Gross / Fee</th>
                        <th>Net Payout</th>
                        <th>Status</th>
                        <!-- Note কলাম থাকবে কিন্তু দৃশ্যমান থাকবে না -->
                        <th class="note-cell"></th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <tr>
                        <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 30px;">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Syncing ledger...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Copied!</span>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Config JS File -->
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Toast Function ---
            function showToast(message) {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                toastMsg.innerText = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // --- Firebase Init ---
            if (typeof firebaseConfig === 'undefined') {
                document.getElementById('history-body').innerHTML = `<tr><td colspan="7" style="text-align:center; color:#ff5252;">Configuration Error: config.js missing</td></tr>`;
                return;
            }

            if (!firebase.apps.length) {
                try {
                    firebase.initializeApp(firebaseConfig);
                } catch (error) {
                    document.getElementById('history-body').innerHTML = `<tr><td colspan="7" style="text-align:center; color:#ff5252;">System Error: Initialization Failed</td></tr>`;
                    return;
                }
            }

            const database = firebase.database();
            const historyBody = document.getElementById('history-body');

            // --- Login Check ---
            function checkLogin() {
                const loggedInUser = localStorage.getItem('currentUser');
                if (!loggedInUser) {
                    window.location.href = "login.html";
                    return null;
                }
                try {
                    return JSON.parse(loggedInUser).uid;
                } catch (e) {
                    window.location.href = "login.html";
                    return null;
                }
            }

            const currentUserId = checkLogin();
            if (!currentUserId) return;

            // --- Wallet Copy ---
            window.copyWallet = function(text) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast("Wallet address copied");
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast("Wallet address copied");
                });
            };

            // --- Tooltip Toggle ---
            let activeTooltip = null;

            window.toggleReasonTip = function(tipId) {
                const tip = document.getElementById(tipId);
                if (!tip) return;

                // আগের খোলা টুলটিপ বন্ধ করো
                if (activeTooltip && activeTooltip !== tip) {
                    activeTooltip.classList.remove('show');
                }

                const isShowing = tip.classList.contains('show');
                tip.classList.toggle('show');
                activeTooltip = isShowing ? null : tip;
            };

            // টুলটিপের বাইরে ক্লিক করলে বন্ধ
            document.addEventListener('click', function(e) {
                if (activeTooltip && !e.target.closest('.reason-tooltip') && !e.target.closest('.status-rejected')) {
                    activeTooltip.classList.remove('show');
                    activeTooltip = null;
                }
            });

            // --- HTML Escape Helper (XSS protection) ---
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // --- Fetch Withdrawal History ---
            database.ref('withdrawals').orderByChild('user_id').equalTo(currentUserId).on('value', (snapshot) => {
                historyBody.innerHTML = "";
                
                if (snapshot.exists()) {
                    let withdrawalsArray = [];

                    snapshot.forEach((child) => {
                        const data = child.val();
                        withdrawalsArray.push({ ...data, key: child.key });
                    });

                    // নতুন আগে সোর্ট
                    withdrawalsArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                    if (withdrawalsArray.length === 0) {
                        historyBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">No withdrawal records found.</td></tr>`;
                        return;
                    }

                    withdrawalsArray.forEach((data) => {
                        const dateObj = new Date(data.timestamp);
                        const dateStr = dateObj.toLocaleDateString();
                        const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        const shortWallet = data.wallet_address 
                            ? `${data.wallet_address.substring(0, 6)}...${data.wallet_address.slice(-4)}` 
                            : "N/A";
                        
                        const isRejected = data.status === 'rejected';
                        const isPending = data.status === 'pending';
                        const isApproved = data.status === 'approved';

                        // --- Status Pill HTML ---
                        let statusHtml = '';
                        if (isPending) {
                            statusHtml = `<span class="status-pill status-pending">
                                <i class="fa-solid fa-spinner fa-spin" style="font-size:9px;"></i> Pending
                            </span>`;
                        } else if (isApproved) {
                            statusHtml = `<span class="status-pill status-approved">
                                <i class="fa-solid fa-check" style="font-size:10px;"></i> Approved
                            </span>`;
                        } else if (isRejected) {
                            // data.reason থেকে রিজন পড়া হচ্ছে এবং escape করা হচ্ছে
                            const rawReason = data.reason || 'No specific reason provided by admin.';
                            const safeReason = escapeHtml(rawReason);
                            const tipId = `rtip-${data.key}`;

                            statusHtml = `
                                <span style="position:relative; display:inline-flex;">
                                    <span class="status-pill status-rejected" onclick="event.stopPropagation(); toggleReasonTip('${tipId}')" title="Click to see why it was rejected">
                                        <span class="pulse-dot"></span> Rejected
                                        <i class="fa-solid fa-eye eye-icon"></i>
                                    </span>
                                    <div class="reason-tooltip" id="${tipId}">
                                        <div class="rt-header">
                                            <i class="fa-solid fa-triangle-exclamation"></i> Rejection Reason
                                        </div>
                                        <div class="rt-body">${safeReason}</div>
                                    </div>
                                </span>
                            `;
                        } else {
                            statusHtml = `<span class="status-pill" style="background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid rgba(255,255,255,0.08);">${data.status || 'Unknown'}</span>`;
                        }

                        // --- Table Row ---
                        const row = `
                            <tr>
                                <td>
                                    <div style="font-weight:600;">${dateStr}</div>
                                    <div style="font-size:11px; color:var(--text-muted);">${timeStr}</div>
                                </td>
                                <td>
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        <i class="fa-solid fa-link" style="color:var(--text-muted); font-size:12px;"></i>
                                        ${data.network || 'Unknown'}
                                    </div>
                                </td>
                                <td>
                                    <span class="wallet-text" onclick="copyWallet('${data.wallet_address}')" title="Click to copy full address">${shortWallet}</span>
                                </td>
                                <td>
                                    <div class="amount-text">$${Number(data.gross_amount).toFixed(2)}</div>
                                    <div class="fee-text">Fee: -$${Number(data.fee).toFixed(2)}</div>
                                </td>
                                <td class="amount-text">$${Number(data.net_amount).toFixed(2)}</td>
                                <td>${statusHtml}</td>
                                <td class="note-cell"></td>
                            </tr>
                        `;
                        historyBody.insertAdjacentHTML('beforeend', row);
                    });

                } else {
                    historyBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">No withdrawal records found.</td></tr>`;
                }
            }, (error) => {
                console.error("History Fetch Error:", error);
                historyBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#ff5252;">Error loading data.</td></tr>`;
            });
        });
    </script>
</body>
</html>
