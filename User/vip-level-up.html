<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Level Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #090a0f;
            --panel-card: #121420;
            --accent-neon: #00ffcc;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --card-border: rgba(255, 255, 255, 0.03);
            --vip-gold: #ffaa00;
            --danger-color: #ff3366;
            --success-green: #00e676;
            --warning-color: #ffab00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 16px;
            min-height: 100vh;
            overflow-y: auto;
        }

        body::-webkit-scrollbar { width: 5px; }
        body::-webkit-scrollbar-track { background: var(--bg-body); }
        body::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        body::-webkit-scrollbar-thumb:hover { background: var(--accent-neon); }

        .page-header { margin-bottom: 20px; }
        .page-header h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.3px; margin-bottom: 4px; }
        .page-header p { color: var(--text-muted); font-size: 12.5px; line-height: 1.5; }

        .status-banner {
            background: linear-gradient(90deg, rgba(0, 255, 204, 0.06) 0%, rgba(18, 20, 32, 0.3) 100%);
            border: 1px solid rgba(0, 255, 204, 0.12);
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 20px;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-info { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; }
        .status-info i { color: var(--accent-neon); font-size: 16px; }
        
        .balance-display {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.3);
            padding: 7px 14px;
            border-radius: 9px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .balance-display span { color: var(--accent-neon); }

        .ref-bar {
            max-width: 900px;
            margin-bottom: 18px;
            background: rgba(255, 171, 0, 0.04);
            border: 1px solid rgba(255, 171, 0, 0.12);
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .ref-bar i { color: var(--vip-gold); font-size: 14px; flex-shrink: 0; }
        .ref-bar strong { color: var(--vip-gold); }

        .vip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            max-width: 900px;
        }

        /* ==================== VIP CARD ==================== */
        .vip-card {
            background: linear-gradient(145deg, #121420 0%, #0e1019 100%);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .vip-card:hover {
            border-color: rgba(0, 255, 204, 0.12);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .card-bg-icon {
            position: absolute;
            top: -12px; right: -12px;
            font-size: 70px;
            opacity: 0.02;
            color: #fff;
            transform: rotate(-10deg);
        }

        .card-glow-orb {
            position: absolute;
            width: 100px; height: 100px;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        .vip-card:hover .card-glow-orb { opacity: 1; }

        /* ==================== ACTIVE STATE ==================== */
        .vip-card.active-state {
            border-color: rgba(0, 255, 204, 0.35);
            background: linear-gradient(145deg, #0e1a1c 0%, #0e1019 100%);
        }
        .vip-card.active-state::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-neon), transparent);
            border-radius: 16px 16px 0 0;
        }
        .vip-card.active-state > * { position: relative; z-index: 1; }

        /* ==================== EXPIRED STATE ==================== */
        .vip-card.expired-state {
            border-color: rgba(255, 51, 102, 0.25);
            background: linear-gradient(145deg, #1a0e12 0%, #0e1019 100%);
        }
        .vip-card.expired-state::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--danger-color), transparent);
            border-radius: 16px 16px 0 0;
        }

        .vip-tag { font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.8px; color: var(--vip-gold); margin-bottom: 2px; }
        .vip-title { font-size: 17px; font-weight: 800; margin-bottom: 10px; }
        
        .vip-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding-bottom: 10px;
        }
        .vip-price span { font-size: 11px; font-weight: 500; color: var(--text-muted); }

        /* ==================== EXPIRY TIMER BOX ==================== */
        .expiry-timer-box {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid rgba(0, 255, 204, 0.12);
            border-radius: 10px;
            padding: 9px 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .expiry-timer-box.expired-timer {
            background: rgba(255, 51, 102, 0.05);
            border-color: rgba(255, 51, 102, 0.15);
        }
        .expiry-label { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .expiry-label i { font-size: 11px; color: var(--accent-neon); }
        .expired-timer .expiry-label i { color: var(--danger-color); }
        
        .expiry-time-value { 
            font-size: 13px; 
            font-weight: 800; 
            color: var(--accent-neon); 
            font-variant-numeric: tabular-nums; 
            letter-spacing: 0.5px;
        }
        .expired-timer .expiry-time-value { color: var(--danger-color); }

        .expiry-date-row {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 3px;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .expiry-date-row i { font-size: 8px; }

        .expiry-ref-bonus {
            font-size: 9px;
            color: var(--vip-gold);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.8;
        }
        .expiry-ref-bonus i { font-size: 8px; }

        .vip-features { list-style: none; display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; flex-grow: 1; }
        .vip-features li { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--text-muted); }
        .vip-features li i { color: var(--accent-neon); font-size: 10px; width: 12px; text-align: center; flex-shrink: 0; }

        /* ==================== BUTTONS ==================== */
        .unlock-btn {
            width: 100%;
            background: linear-gradient(135deg, #00ffcc 0%, #00b38f 100%);
            color: #000;
            border: none;
            padding: 11px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12.5px;
            cursor: pointer;
            transition: opacity 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }
        .unlock-btn:hover { opacity: 0.9; box-shadow: 0 4px 16px rgba(0, 255, 204, 0.15); }

        .unlock-btn.btn-active {
            background: rgba(0, 255, 204, 0.07) !important;
            color: var(--accent-neon) !important;
            border: 1px solid rgba(0, 255, 204, 0.2) !important;
            cursor: pointer !important;
            pointer-events: auto !important;
        }
        .unlock-btn.btn-active:hover { background: rgba(0, 255, 204, 0.1) !important; box-shadow: none; }

        .unlock-btn.btn-expired {
            background: linear-gradient(135deg, #ff3366 0%, #cc0044 100%) !important;
            color: #fff !important;
            border: none !important;
            cursor: pointer !important;
            pointer-events: auto !important;
        }
        .unlock-btn.btn-expired:hover {
            opacity: 0.9;
            box-shadow: 0 4px 16px rgba(255, 51, 102, 0.25);
        }

        /* ==================== LOCK BADGE ==================== */
        .lock-overlay-badge {
            position: absolute;
            top: 14px; right: 14px;
            width: 30px; height: 30px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .lock-overlay-badge i { font-size: 11px; color: #444; }
        .vip-card.active-state .lock-overlay-badge {
            background: rgba(0, 255, 204, 0.08);
            border-color: rgba(0, 255, 204, 0.18);
        }
        .vip-card.active-state .lock-overlay-badge i { color: var(--accent-neon); }
        .vip-card.expired-state .lock-overlay-badge {
            background: rgba(255, 51, 102, 0.08);
            border-color: rgba(255, 51, 102, 0.18);
        }
        .vip-card.expired-state .lock-overlay-badge i { color: var(--danger-color); }

        /* ==================== POPUP ==================== */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 5, 9, 0.88);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 16px;
        }
        .popup-overlay.show { opacity: 1; pointer-events: auto; }

        .popup-box {
            background: linear-gradient(145deg, #16192b 0%, #0e1019 100%);
            border: 1px solid rgba(0, 255, 204, 0.12);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 26px; border-radius: 20px;
            width: 100%; max-width: 400px;
            text-align: center;
            transform: scale(0.95);
            transition: transform 0.25s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .popup-overlay.show .popup-box { transform: scale(1); }

        .popup-icon-container {
            width: 60px; height: 60px;
            background: rgba(0, 255, 204, 0.07);
            border: 2px solid rgba(0, 255, 204, 0.2);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }
        .popup-icon-container i { color: var(--accent-neon); font-size: 26px; }

        .popup-icon-container.icon-warning {
            background: rgba(255, 171, 0, 0.07);
            border-color: rgba(255, 171, 0, 0.2);
        }
        .popup-icon-container.icon-warning i { color: var(--warning-color); }

        .popup-icon-container.icon-danger {
            background: rgba(255, 51, 102, 0.07);
            border-color: rgba(255, 51, 102, 0.2);
        }
        .popup-icon-container.icon-danger i { color: var(--danger-color); }

        .popup-title { font-size: 19px; font-weight: 800; margin-bottom: 10px; color: #fff; }
        .popup-msg { color: var(--text-muted); font-size: 12.5px; line-height: 1.6; margin-bottom: 6px; }
        .popup-msg strong { color: var(--text-main); }

        .popup-expiry-info {
            background: rgba(0, 255, 204, 0.04);
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            margin: 14px 0 20px;
            text-align: left;
        }
        .popup-expiry-info.info-expired {
            background: rgba(255, 51, 102, 0.04);
            border-color: rgba(255, 51, 102, 0.12);
        }
        .popup-expiry-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 5px 0;
        }
        .popup-expiry-row:not(:last-child) {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 5px;
            padding-bottom: 8px;
        }
        .popup-expiry-label {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .popup-expiry-label i { font-size: 12px; color: var(--accent-neon); width: 14px; text-align: center; }
        .info-expired .popup-expiry-label i { color: var(--danger-color); }
        .popup-expiry-value {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-neon);
            font-variant-numeric: tabular-nums;
        }
        .info-expired .popup-expiry-value { color: var(--danger-color); }

        .popup-btn-group {
            display: flex;
            gap: 8px;
        }
        .popup-btn-group button {
            flex: 1;
            padding: 11px 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12.5px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            border: none;
        }
        .popup-cancel-btn {
            background: rgba(255,255,255,0.04) !important;
            color: var(--text-muted) !important;
            border: 1px solid rgba(255,255,255,0.06) !important;
        }
        .popup-cancel-btn:hover { background: rgba(255,255,255,0.07) !important; }
        .popup-confirm-btn {
            background: linear-gradient(135deg, #00ffcc 0%, #00b38f 100%) !important;
            color: #000 !important;
        }
        .popup-confirm-btn:hover { opacity: 0.9; }
        .popup-confirm-btn.btn-danger-confirm {
            background: linear-gradient(135deg, #ff3366 0%, #cc0044 100%) !important;
            color: #fff !important;
        }

        .popup-single-btn {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12.5px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: none;
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .popup-single-btn:hover { background: rgba(255,255,255,0.07); }

        /* ==================== TOAST ==================== */
        .toast-notification {
            position: fixed;
            top: 20px; right: 20px;
            background: linear-gradient(145deg, #0d2818 0%, #0e1019 100%);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: var(--text-main);
            padding: 14px 22px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            z-index: 99999;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
            max-width: calc(100% - 40px);
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-notification i { color: var(--success-green); font-size: 18px; flex-shrink: 0; }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .page-header { margin-bottom: 16px; }
            .page-header h1 { font-size: 19px; }
            .status-banner { flex-direction: column; gap: 10px; align-items: stretch; text-align: center; padding: 12px 14px; }
            .status-info { justify-content: center; font-size: 12px; }
            .balance-display { font-size: 14px; padding: 6px 12px; }
            .vip-grid { grid-template-columns: 1fr; gap: 14px; }
            .popup-box { padding: 22px 18px; }
            .popup-expiry-row { flex-direction: column; align-items: flex-start; gap: 3px; }
            .toast-notification { right: 12px; left: 12px; top: 12px; }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .vip-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="page-header">
        <h1>VIP Multi-Level Matrix</h1>
        <p>Deploy extraction layers to expand your mining capabilities. Any VIP can be purchased.</p>
    </div>

    <div class="status-banner">
        <div class="status-info">
            <i class="fa-solid fa-bolt-lightning"></i>
            <span>Node Activation Panel</span>
        </div>
        <div class="balance-display">
            Balance: <span id="wallet-balance-amount">Loading...</span> <span>USDT</span>
        </div>
    </div>

    <div class="ref-bar" id="ref-bar">
        <i class="fa-solid fa-user-group"></i>
        <span>Active Referrals: <strong id="active-ref-count-display">0</strong> — Expiry = total active referrals in days.</span>
    </div>

    <div class="vip-grid" id="level-container-grid"></div>

    <!-- পপআপ -->
    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-box" id="popup-box">
            <div class="popup-icon-container" id="popup-icon-container">
                <i class="fa-solid fa-circle-info" id="popup-icon"></i>
            </div>
            <div class="popup-title" id="popup-title-text"></div>
            <div class="popup-msg" id="popup-message-text"></div>
            <div id="popup-extra-content"></div>
            <div id="popup-buttons-container"></div>
        </div>
    </div>

    <!-- টোস্ট -->
    <div class="toast-notification" id="success-toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-message-text"></span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            function checkLogin() {
                const u = localStorage.getItem('currentUser');
                if (!u) {
                    window.top !== window ? (window.top.location.href = "login.html") : (window.location.href = "login.html");
                    return null;
                }
                try { return JSON.parse(u).uid; } 
                catch (e) {
                    window.top !== window ? (window.top.location.href = "login.html") : (window.location.href = "login.html");
                    return null;
                }
            }

            const uid = checkLogin();
            if (!uid) return;

            if (typeof firebaseConfig !== 'undefined') {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            } else { alert("config.js missing!"); return; }

            const db = firebase.database();

            let balance = 0;
            let activeVip = null;
            let purchaseTs = null;
            let activeRef = 0;
            let levels = {};
            let pending = false;
            let cdInterval = null;
            let popCdInterval = null;

            const $grid = document.getElementById('level-container-grid');
            const $bal = document.getElementById('wallet-balance-amount');
            const $ref = document.getElementById('active-ref-count-display');
            const $pop = document.getElementById('popup-overlay');
            const $popIcon = document.getElementById('popup-icon-container');
            const $popI = document.getElementById('popup-icon');
            const $popT = document.getElementById('popup-title-text');
            const $popM = document.getElementById('popup-message-text');
            const $popE = document.getElementById('popup-extra-content');
            const $popB = document.getElementById('popup-buttons-container');
            const $toast = document.getElementById('success-toast');
            const $toastM = document.getElementById('toast-message-text');

            const pad = n => n.toString().padStart(2, '0');
            
            function fmtDate(ts) {
                if (!ts) return '--';
                const d = new Date(ts);
                const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                return `${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            }

            // এক্সপায়ারি = পারচেস টাইম + (activeReferrals × ২৪ ঘন্টা)
            // 30 দিন আর যোগ হবে না, শুধু active referral এর সমান দিন
            function getExpiryTs() {
                if (!purchaseTs) return null;
                return purchaseTs + (activeRef * 86400000);
            }

            function getRemaining() {
                const e = getExpiryTs();
                return e ? e - Date.now() : null;
            }

            function fmtTime(ms) {
                if (ms <= 0) return { text: "00d 00h 00m 00s", expired: true };
                const t = Math.floor(ms / 1000);
                return {
                    text: `${pad(Math.floor(t/86400))}d ${pad(Math.floor((t%86400)/3600))}h ${pad(Math.floor((t%3600)/60))}m ${pad(t%60)}s`,
                    expired: false
                };
            }

            function isExpired() {
                const r = getRemaining();
                return r === null ? false : r <= 0;
            }

            // --- পপআপ ---
            function closePop() {
                $pop.classList.remove('show');
                if (popCdInterval) { clearInterval(popCdInterval); popCdInterval = null; }
            }

            function showPop(o) {
                $popI.className = `fa-solid ${o.icon || 'fa-circle-info'}`;
                $popIcon.className = 'popup-icon-container' + (o.ic ? ' ' + o.ic : '');
                $popT.innerText = o.title || '';
                $popM.innerHTML = o.msg || '';
                $popE.innerHTML = o.extra || '';
                $popB.innerHTML = '';
                const btns = o.btns || [];
                if (btns.length === 1) {
                    const b = document.createElement('button');
                    b.className = 'popup-single-btn';
                    b.innerHTML = btns[0].t;
                    b.onclick = () => { closePop(); if (btns[0].fn) btns[0].fn(); };
                    $popB.appendChild(b);
                } else if (btns.length > 1) {
                    const g = document.createElement('div');
                    g.className = 'popup-btn-group';
                    btns.forEach(x => {
                        const b = document.createElement('button');
                        b.className = x.c || 'popup-cancel-btn';
                        b.innerHTML = x.t;
                        b.onclick = () => { closePop(); if (x.fn) x.fn(); };
                        g.appendChild(b);
                    });
                    $popB.appendChild(g);
                }
                $pop.classList.add('show');
            }

            function toast(m) {
                $toastM.innerText = m;
                $toast.classList.add('show');
                setTimeout(() => $toast.classList.remove('show'), 3500);
            }

            // --- কাউন্টডাউন ---
            function startCd() {
                if (cdInterval) clearInterval(cdInterval);
                cdInterval = setInterval(() => {
                    const el = document.getElementById('card-timer-val');
                    if (!el) return;
                    const r = getRemaining();
                    if (r === null) { el.innerText = '--'; return; }
                    const f = fmtTime(r);
                    el.innerText = f.text;
                    const card = el.closest('.vip-card');
                    const box = el.closest('.expiry-timer-box');
                    const btn = card ? card.querySelector('.unlock-btn') : null;
                    const badge = card ? card.querySelector('.lock-overlay-badge i') : null;

                    if (f.expired) {
                        box && box.classList.add('expired-timer');
                        card && card.classList.add('expired-state');
                        card && card.classList.remove('active-state');
                        if (btn && !btn.classList.contains('btn-expired')) {
                            btn.className = 'unlock-btn btn-expired';
                            btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> Repurchase';
                        }
                        if (badge) badge.className = 'fa-solid fa-hourglass-end';
                    } else {
                        box && box.classList.remove('expired-timer');
                        card && card.classList.remove('expired-state');
                        if (btn && !btn.classList.contains('btn-active')) {
                            btn.className = 'unlock-btn btn-active';
                            btn.innerHTML = '<i class="fa-solid fa-signal"></i> Active';
                        }
                        if (badge) badge.className = 'fa-solid fa-signal';
                    }

                    const refEl = document.getElementById('card-ref-bonus');
                    if (refEl) refEl.innerText = `${activeRef} active referral${activeRef !== 1 ? 's' : ''} = ${activeRef} day${activeRef !== 1 ? 's' : ''}`;
                }, 1000);
            }

            function startPopCd() {
                if (popCdInterval) clearInterval(popCdInterval);
                const el = document.getElementById('pop-cd-val');
                if (!el) return;
                popCdInterval = setInterval(() => {
                    const r = getRemaining();
                    if (r === null) { el.innerText = '--'; return; }
                    const f = fmtTime(r);
                    el.innerText = f.text;
                    if (f.expired) { clearInterval(popCdInterval); el.innerText = '00d 00h 00m 00s'; }
                }, 1000);
            }

            // --- লিসেনার ---
            db.ref('users/' + uid).on('value', s => {
                if (s.exists()) {
                    const d = s.val();
                    balance = parseFloat(d.balance || 0);
                    activeVip = d.current_vip || null;
                    purchaseTs = d.vipPurchaseTimestamp || null;
                    activeRef = parseInt(d.activeReferrals || 0);
                    $bal.innerText = balance.toFixed(2);
                    $ref.innerText = activeRef;
                    render();
                    startCd();
                } else {
                    $bal.innerText = "0.00"; $ref.innerText = "0";
                    activeVip = null; purchaseTs = null; activeRef = 0;
                    render();
                }
            });

            db.ref('vip_settings').on('value', s => {
                if (s.exists()) { levels = s.val(); render(); }
                else { $grid.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;text-align:center;padding:30px 0;">No VIP levels configured.</div>'; }
            });

            // --- রেন্ডার ---
            function render() {
                if (!Object.keys(levels).length) return;
                $grid.innerHTML = "";
                const keys = Object.keys(levels).sort((a, b) => (parseInt(a.replace(/^\D+/g,''))||0) - (parseInt(b.replace(/^\D+/g,''))||0));
                const exp = isExpired();

                keys.forEach(k => {
                    const lv = levels[k];
                    const name = lv.level_name;
                    const isAct = name === activeVip;
                    const isExp = isAct && exp;
                    const amt = parseFloat(lv.amount || 0);
                    const daily = parseFloat(lv.daily_earning || 0);
                    const days = parseInt(lv.validity_days || 0);

                    const c = document.createElement('div');
                    let cc = 'vip-card', bc = 'unlock-btn', bh = '', bi = '', th = '', gc = 'rgba(255,255,255,0.02)';

                    if (isAct && !exp) {
                        cc += ' active-state'; bc += ' btn-active';
                        bh = '<i class="fa-solid fa-signal"></i> Active';
                        bi = '<i class="fa-solid fa-signal"></i>';
                        const r = getRemaining();
                        const f = r !== null ? fmtTime(r) : null;
                        const eTs = getExpiryTs();
                        th = `<div class="expiry-timer-box">
                            <div>
                                <div class="expiry-label"><i class="fa-solid fa-clock"></i> Expires In</div>
                                <div class="expiry-date-row"><i class="fa-regular fa-calendar"></i> ${fmtDate(eTs)}</div>
                                <div class="expiry-ref-bonus"><i class="fa-solid fa-arrow-up"></i> <span id="card-ref-bonus">${activeRef} active referral${activeRef!==1?'s':''} = ${activeRef} day${activeRef!==1?'s':''}</span></div>
                            </div>
                            <div class="expiry-time-value" id="card-timer-val">${f ? f.text : '--'}</div>
                        </div>`;
                        gc = 'rgba(0,255,204,0.08)';
                    } else if (isExp) {
                        cc += ' expired-state'; bc = 'unlock-btn btn-expired';
                        bh = '<i class="fa-solid fa-rotate-right"></i> Repurchase';
                        bi = '<i class="fa-solid fa-hourglass-end"></i>';
                        const eTs = getExpiryTs();
                        th = `<div class="expiry-timer-box expired-timer">
                            <div>
                                <div class="expiry-label"><i class="fa-solid fa-clock"></i> Expired</div>
                                <div class="expiry-date-row"><i class="fa-regular fa-calendar"></i> ${fmtDate(eTs)}</div>
                            </div>
                            <div class="expiry-time-value" id="card-timer-val">00d 00h 00m 00s</div>
                        </div>`;
                        gc = 'rgba(255,51,102,0.06)';
                    } else {
                        bh = `<i class="fa-solid fa-cart-shopping"></i> ${amt.toFixed(2)} USDT`;
                        bi = '<i class="fa-solid fa-cart-shopping"></i>';
                    }

                    c.className = cc;
                    c.id = `vc-${name.replace(/\s+/g,'-')}`;
                    c.innerHTML = `
                        <div class="card-glow-orb" style="background:${gc};top:-25px;left:-25px;"></div>
                        <div class="card-glow-orb" style="background:${gc};bottom:-25px;right:-25px;"></div>
                        <div class="lock-overlay-badge">${bi}</div>
                        <div class="card-bg-icon"><i class="fa-solid fa-server"></i></div>
                        <div class="vip-tag">Mining Layer</div>
                        <div class="vip-title">${name}</div>
                        <div class="vip-price">${amt.toFixed(2)} <span>USDT</span></div>
                        ${th}
                        <ul class="vip-features">
                            <li><i class="fa-solid fa-circle-nodes"></i> Daily: ${daily.toFixed(2)} USDT</li>
                            <li><i class="fa-solid fa-microchip"></i> High Performance</li>
                            <li><i class="fa-solid fa-user-group"></i> Expiry: 1 day per active ref</li>
                        </ul>
                        <button class="${bc}" id="vb-${name.replace(/\s+/g,'-')}">${bh}</button>
                    `;
                    $grid.appendChild(c);

                    const btn = document.getElementById(`vb-${name.replace(/\s+/g,'-')}`);
                    if (isAct && !exp) {
                        btn.onclick = () => showActivePop(name);
                    } else if (isExp) {
                        btn.onclick = () => showRepurchasePop(name, amt);
                    } else {
                        btn.onclick = () => showPurchasePop(name, amt);
                    }
                });
            }

            // --- পপআপ ফাংশন ---
            function showActivePop(name) {
                const eTs = getExpiryTs();
                const r = getRemaining();
                const f = r !== null ? fmtTime(r) : { text: '--', expired: false };
                showPop({
                    icon: f.expired ? 'fa-hourglass-end' : 'fa-signal',
                    ic: f.expired ? 'icon-danger' : '',
                    title: name + ' — Status',
                    msg: f.expired ? `Your <strong>${name}</strong> has expired.` : `Your <strong>${name}</strong> is active.`,
                    extra: `<div class="popup-expiry-info ${f.expired?'info-expired':''}">
                        <div class="popup-expiry-row">
                            <div class="popup-expiry-label"><i class="fa-solid fa-calendar-day"></i> Expires On</div>
                            <div class="popup-expiry-value">${fmtDate(eTs)}</div>
                        </div>
                        <div class="popup-expiry-row">
                            <div class="popup-expiry-label"><i class="fa-solid fa-clock"></i> Remaining</div>
                            <div class="popup-expiry-value" id="pop-cd-val">${f.text}</div>
                        </div>
                        <div class="popup-expiry-row">
                            <div class="popup-expiry-label"><i class="fa-solid fa-user-group"></i> Total Days</div>
                            <div class="popup-expiry-value">${activeRef} day${activeRef!==1?'s':''}</div>
                        </div>
                        <div class="popup-expiry-row">
                            <div class="popup-expiry-label"><i class="fa-solid fa-arrow-up"></i> From Referrals</div>
                            <div class="popup-expiry-value" style="color:var(--vip-gold);">${activeRef} active referral${activeRef!==1?'s':''}</div>
                        </div>
                    </div>`,
                    btns: [{ t: 'Close', c: 'popup-cancel-btn' }]
                });
                startPopCd();
            }

            function showPurchasePop(name, amt) {
                const eTs = getExpiryTs();
                const r = getRemaining();
                const f = r !== null ? fmtTime(r) : null;

                if (activeVip && !isExpired()) {
                    showPop({
                        icon: 'fa-triangle-exclamation', ic: 'icon-warning',
                        title: 'Replace Active Level?',
                        msg: `Purchasing <strong>${name}</strong> will deactivate <strong>${activeVip}</strong>. Remaining time lost.`,
                        extra: `<div class="popup-expiry-info">
                            <div class="popup-expiry-row">
                                <div class="popup-expiry-label"><i class="fa-solid fa-signal"></i> Active VIP</div>
                                <div class="popup-expiry-value">${activeVip}</div>
                            </div>
                            <div class="popup-expiry-row">
                                <div class="popup-expiry-label"><i class="fa-solid fa-calendar-day"></i> Expires On</div>
                                <div class="popup-expiry-value">${fmtDate(eTs)}</div>
                            </div>
                            <div class="popup-expiry-row">
                                <div class="popup-expiry-label"><i class="fa-solid fa-clock"></i> Remaining</div>
                                <div class="popup-expiry-value" id="pop-cd-val">${f ? f.text : '--'}</div>
                            </div>
                        </div>`,
                        btns: [
                            { t: 'Cancel', c: 'popup-cancel-btn' },
                            { t: `Switch — ${amt.toFixed(2)} USDT`, c: 'popup-confirm-btn btn-danger-confirm', fn: () => buy(name, amt) }
                        ]
                    });
                    startPopCd();
                } else {
                    showPop({
                        icon: 'fa-cart-shopping',
                        title: `Purchase ${name}`,
                        msg: `Activate <strong>${name}</strong> for <strong>${amt.toFixed(2)} USDT</strong>?<br>Expiry: <strong>${activeRef} day${activeRef!==1?'s':''}</strong> (based on your ${activeRef} active referral${activeRef!==1?'s':''}).`,
                        extra: '',
                        btns: [
                            { t: 'Cancel', c: 'popup-cancel-btn' },
                            { t: `Purchase — ${amt.toFixed(2)} USDT`, c: 'popup-confirm-btn', fn: () => buy(name, amt) }
                        ]
                    });
                }
            }

            function showRepurchasePop(name, amt) {
                showPop({
                    icon: 'fa-rotate-right', ic: 'icon-danger',
                    title: `Repurchase ${name}`,
                    msg: `Your <strong>${name}</strong> expired.<br>Repurchase for <strong>${amt.toFixed(2)} USDT</strong>?<br>New expiry: <strong>${activeRef} day${activeRef!==1?'s':''}</strong> (based on ${activeRef} active referral${activeRef!==1?'s':''}).`,
                    extra: '',
                    btns: [
                        { t: 'Cancel', c: 'popup-cancel-btn' },
                        { t: `Repurchase — ${amt.toFixed(2)} USDT`, c: 'popup-confirm-btn btn-danger-confirm', fn: () => buy(name, amt) }
                    ]
                });
            }

            function buy(name, cost) {
                if (pending) return;
                if (balance < cost) {
                    showPop({
                        icon: 'fa-wallet', ic: 'icon-danger',
                        title: 'Insufficient Balance',
                        msg: `Need <strong>${cost.toFixed(2)} USDT</strong>, have <strong>${balance.toFixed(2)} USDT</strong>.`,
                        btns: [{ t: 'Close', c: 'popup-cancel-btn' }]
                    });
                    return;
                }
                pending = true;
                db.ref('users/' + uid).update({
                    balance: Number((balance - cost).toFixed(4)),
                    current_vip: name,
                    vipPurchaseTimestamp: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    toast(`${name} activated!`);
                    pending = false;
                }).catch(err => {
                    console.error(err);
                    showPop({ icon: 'fa-xmark', ic: 'icon-danger', title: 'Failed', msg: 'Try again.', btns: [{ t: 'OK', c: 'popup-cancel-btn' }] });
                    pending = false;
                });
            }

        });

        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
</body>
</html>
