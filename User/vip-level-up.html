<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Level Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #090a0f;
            --panel-card: #121420;
            --accent-neon: #00ffcc;
            --accent-hover: #00b38f;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --card-border: rgba(255, 255, 255, 0.03);
            --vip-gold: #ffaa00;
            --danger-color: #ff3366;
            --success-green: #00e676;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 24px;
            min-height: 100vh;
            overflow-y: auto;
        }

        body::-webkit-scrollbar { width: 6px; }
        body::-webkit-scrollbar-track { background: #090a0f; }
        body::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        body::-webkit-scrollbar-thumb:hover { background: var(--accent-neon); }

        .page-header { margin-bottom: 35px; }
        .page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; }
        .page-header p { color: var(--text-muted); font-size: 14px; }

        .status-banner {
            background: linear-gradient(90deg, rgba(0, 255, 204, 0.07) 0%, rgba(18, 20, 32, 0.3) 100%);
            border: 1px solid rgba(0, 255, 204, 0.15);
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 35px;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.02);
        }
        .status-info { display: flex; align-items: center; gap: 12px; font-size: 15px; }
        .status-info i { color: var(--accent-neon); font-size: 20px; animation: pulse 2s infinite; }
        
        .balance-display {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .balance-display span { color: var(--accent-neon); }

        .vip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 24px;
            max-width: 1200px;
        }

        .vip-card {
            background: linear-gradient(145deg, #121420 0%, #0e1019 100%);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .vip-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 204, 0.2);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .card-bg-icon {
            position: absolute;
            top: -15px;
            right: -15px;
            font-size: 90px;
            opacity: 0.02;
            color: #fff;
            transform: rotate(-10deg);
        }

        /* --- অ্যাক্টিভ স্টেট (বর্তমান চলমান VIP) --- */
        .vip-card.active-state {
            border-color: rgba(0, 255, 204, 0.4);
            background: linear-gradient(145deg, #0e1a1c 0%, #0e1019 100%);
        }
        .vip-card.active-state::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-neon), transparent);
            border-radius: 20px 20px 0 0;
            animation: shimmer 2.5s infinite;
        }
        .vip-card.active-state .vip-tag {
            color: var(--accent-neon);
        }

        /* --- পূর্বে আনলকড (কিন্তু বর্তমানে অ্যাক্টিভ নয়) --- */
        .vip-card.unlocked-state {
            border-color: rgba(0, 230, 118, 0.2);
            background: linear-gradient(145deg, #10140f 0%, #0e1019 100%);
        }
        .vip-card.unlocked-state .vip-tag {
            color: var(--success-green);
        }

        /* --- নতুন কেনার যোগ্য (না কেনা VIP) --- */
        .vip-card.purchase-state {
            border-color: rgba(255, 170, 0, 0.15);
        }
        .vip-card.purchase-state:hover {
            border-color: rgba(255, 170, 0, 0.35);
        }

        .vip-tag { font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; color: var(--vip-gold); margin-bottom: 4px; }
        .vip-title { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
        
        .vip-price {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding-bottom: 12px;
        }
        .vip-price span { font-size: 13px; font-weight: 500; color: var(--text-muted); }

        .vip-features { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; flex-grow: 1; }
        .vip-features li { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
        .vip-features li i { color: var(--accent-neon); font-size: 12px; }

        /* --- কমন বাটন বেস --- */
        .unlock-btn {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* --- পারচেজ বাটন (গোল্ড, ক্লিকেবল) --- */
        .unlock-btn.btn-purchase {
            background: linear-gradient(135deg, #ffaa00 0%, #cc8800 100%);
            color: #000;
        }
        .unlock-btn.btn-purchase:hover { opacity: 0.9; transform: scale(0.98); box-shadow: 0 5px 20px rgba(255, 170, 0, 0.2); }

        /* --- সুইচ বাটন (সবুজ, ক্লিকেবল — পুরান VIP তে ফিরে যেতে) --- */
        .unlock-btn.btn-switch {
            background: linear-gradient(135deg, #00e676 0%, #00b35f 100%);
            color: #000;
        }
        .unlock-btn.btn-switch:hover { opacity: 0.9; transform: scale(0.98); box-shadow: 0 5px 20px rgba(0, 230, 118, 0.2); }

        /* --- অ্যাক্টিভ বাটন (নিয়ন, ডিসেবলড) --- */
        .unlock-btn.btn-active {
            background: rgba(0, 255, 204, 0.08) !important;
            color: var(--accent-neon) !important;
            border: 1px solid rgba(0, 255, 204, 0.25) !important;
            cursor: default !important;
            pointer-events: none;
        }

        /* --- লোডিং স্টেট --- */
        .unlock-btn.btn-loading {
            background: rgba(255, 255, 255, 0.06) !important;
            color: var(--text-muted) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            cursor: wait !important;
            pointer-events: none;
        }
        .btn-loading .spinner-icon {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: var(--text-muted);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* --- পপআপ --- */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 5, 9, 0.85);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .popup-overlay.show { opacity: 1; pointer-events: auto; }

        .popup-box {
            background: linear-gradient(145deg, #16192b 0%, #0e1019 100%);
            border: 1px solid rgba(255, 51, 102, 0.2);
            box-shadow: 0 20px 50px rgba(255, 51, 102, 0.1);
            padding: 30px; border-radius: 24px;
            width: 90%; max-width: 400px;
            text-align: center;
            transform: scale(0.7) translateY(30px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .popup-overlay.show .popup-box { transform: scale(1) translateY(0); }

        .popup-icon-container {
            width: 70px; height: 70px;
            background: rgba(255, 51, 102, 0.1);
            border: 1px dashed var(--danger-color);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .popup-icon-container i { color: var(--danger-color); font-size: 32px; }

        .popup-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .popup-msg { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .popup-msg strong { color: var(--text-main); }

        .popup-close-btn {
            background: linear-gradient(135deg, #ff3366 0%, #cc0044 100%);
            color: #fff; border: none; padding: 12px 30px;
            border-radius: 12px; font-weight: 700; font-size: 14px;
            cursor: pointer; width: 100%; transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 51, 102, 0.2);
        }
        .popup-close-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* --- সাকসেস টোস্ট --- */
        .toast-notification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(145deg, #0d2818 0%, #0e1019 100%);
            border: 1px solid rgba(0, 230, 118, 0.35);
            color: var(--text-main);
            padding: 18px 28px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            z-index: 99999;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-notification i { color: var(--success-green); font-size: 20px; }

        /* --- ব্যাজ আইকন --- */
        .lock-overlay-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .lock-overlay-badge i { font-size: 13px; color: #444; }
        .vip-card.active-state .lock-overlay-badge i { color: var(--accent-neon); }
        .vip-card.unlocked-state .lock-overlay-badge i { color: var(--success-green); }
        .vip-card.purchase-state .lock-overlay-badge i { color: var(--vip-gold); }

        /* --- অ্যাক্টিভ লেবেল ব্যাজ --- */
        .active-label-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 255, 204, 0.12);
            border: 1px solid rgba(0, 255, 204, 0.3);
            color: var(--accent-neon);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 4px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
            animation: shimmer 2.5s infinite;
        }
        .active-label-badge i { font-size: 8px; }

        /* --- পূর্বে কেনা লেবেল --- */
        .purchased-label-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.2);
            color: var(--success-green);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 4px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
        }
        .purchased-label-badge i { font-size: 8px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shimmer {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .status-banner { flex-direction: column; gap: 15px; align-items: stretch; text-align: center; }
            .status-info { justify-content: center; }
            .toast-notification { right: 16px; left: 16px; top: 16px; }
            .vip-price { font-size: 22px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="page-header">
        <h1>VIP Multi-Level Matrix</h1>
        <p>Deploy specialized higher extraction layers to expand your automated mining farm capabilities.</p>
    </div>

    <div class="status-banner">
        <div class="status-info">
            <i class="fa-solid fa-bolt-lightning"></i>
            <span>Instant Balance Node Trigger Activation Panel</span>
        </div>
        <div class="balance-display">
            Account Balance: <span id="wallet-balance-amount">Loading...</span> <span>USDT</span>
        </div>
    </div>

    <div class="vip-grid" id="level-container-grid"></div>

    <!-- ইনসাফিশিয়েন্ট ব্যালেন্স পপআপ -->
    <div class="popup-overlay" id="insufficient-popup-overlay">
        <div class="popup-box">
            <div class="popup-icon-container">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <div class="popup-title">Insufficient Funds</div>
            <div class="popup-msg" id="popup-error-message-text"></div>
            <button class="popup-close-btn" id="popup-close-action-btn">Acknowledge Node</button>
        </div>
    </div>

    <!-- সাকসেস টোস্ট -->
    <div class="toast-notification" id="success-toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-message-text"></span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- লগইন চেক ---
            function checkLogin() {
                const loggedInUser = localStorage.getItem('currentUser');
                if (!loggedInUser) {
                    if (window !== window.top) {
                        window.top.location.href = "login.html";
                    } else {
                        window.location.href = "login.html";
                    }
                    return null;
                }
                try {
                    const userData = JSON.parse(loggedInUser);
                    return userData.uid; 
                } catch (e) {
                    if (window !== window.top) {
                        window.top.location.href = "login.html";
                    } else {
                        window.location.href = "login.html";
                    }
                    return null;
                }
            }

            const currentUserId = checkLogin();
            if (!currentUserId) return;

            // Firebase Initialize
            if (typeof firebaseConfig !== 'undefined') {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
            } else {
                alert("Configuration Error: config.js missing!");
                return;
            }

            const database = firebase.database();

            let currentAccountBalance = 0.00;
            let unlockedVipList = [];      // যেসব VIP একবার কিনেছে
            let activeVipName = null;       // বর্তমানে যে VIP অ্যাক্টিভ আছে
            let cachedVipLevels = {};
            let loadingButtonId = null;     // কোন বাটন এখন লোডিং এ আছে

            const gridContainer = document.getElementById('level-container-grid');
            const balanceDisplayElement = document.getElementById('wallet-balance-amount');
            const popupOverlay = document.getElementById('insufficient-popup-overlay');
            const popupMsg = document.getElementById('popup-error-message-text');
            const popupCloseBtn = document.getElementById('popup-close-action-btn');
            const successToast = document.getElementById('success-toast');
            const toastMessage = document.getElementById('toast-message-text');

            // পপআপ বন্ধ
            popupCloseBtn.addEventListener('click', () => {
                popupOverlay.classList.remove('show');
            });

            // ইনসাফিশিয়েন্ট ব্যালেন্স পপআপ দেখানো
            function showInsufficientBalancePopup(required, available, vipName) {
                let switchNote = '';
                if (activeVipName && activeVipName !== vipName) {
                    switchNote = `<br><br><i class="fa-solid fa-circle-info" style="color:var(--accent-neon);"></i> Switching to <strong>${vipName}</strong> will cancel your current <strong>${activeVipName}</strong>.`;
                }
                popupMsg.innerHTML = `You do not have enough core node assets to activate this layer.${switchNote}<br><br>Required: <strong>${required.toFixed(2)} USDT</strong><br>Available: <strong>${available.toFixed(2)} USDT</strong>`;
                popupOverlay.classList.add('show');
            }

            // সাকসেস টোস্ট দেখানো
            function showSuccessToast(message) {
                toastMessage.innerText = message;
                successToast.classList.add('show');
                setTimeout(() => {
                    successToast.classList.remove('show');
                }, 3500);
            }

            // VIP নাম থেকে নম্বর বের করা
            function extractVipNumber(vipName) {
                const match = vipName.match(/\d+/);
                return match ? parseInt(match[0]) : 0;
            }

            // --- রিয়েল-টাইম ইউজার ডাটা লিসেন ---
            function listenToUserStats() {
                const userRef = database.ref('users/' + currentUserId);
                
                userRef.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        currentAccountBalance = parseFloat(userData.balance || 0);
                        
                        // unlockedVips অ্যারে লোড
                        if (Array.isArray(userData.unlockedVips)) {
                            unlockedVipList = [...userData.unlockedVips];
                        } else {
                            unlockedVipList = [];
                        }

                        // activeVip লোড (স্ট্রিং বা null)
                        activeVipName = userData.current_vip || null;
                        
                        balanceDisplayElement.innerText = currentAccountBalance.toFixed(2);
                        renderVIPGrid();
                    } else {
                        balanceDisplayElement.innerText = "0.00";
                        unlockedVipList = [];
                        activeVipName = null;
                        renderVIPGrid();
                    }
                }, (error) => {
                    console.error("Error fetching user data: ", error);
                });
            }

            // --- রিয়েল-টাইম VIP সেটিংস লিসেন ---
            function listenToVIPLevels() {
                const vipSettingsRef = database.ref('vip_settings');
                
                vipSettingsRef.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        cachedVipLevels = snapshot.val();
                        renderVIPGrid();
                    } else {
                        gridContainer.innerHTML = `<div style="color: var(--text-muted); font-size:14px; grid-column: 1/-1; text-align:center; padding:40px 0;">No VIP matrix configuration found on server.</div>`;
                    }
                }, (error) => {
                    console.error("Error fetching VIP levels: ", error);
                });
            }

            // --- UI রেন্ডার লজিক ---
            function renderVIPGrid() {
                if (Object.keys(cachedVipLevels).length === 0) return;
                
                gridContainer.innerHTML = "";

                // সর্ট করা কি গুলো
                const sortedKeys = Object.keys(cachedVipLevels).sort((a, b) => {
                    const numA = parseInt(a.replace(/^\D+/g, '')) || 0;
                    const numB = parseInt(b.replace(/^\D+/g, '')) || 0;
                    return numA - numB;
                });

                sortedKeys.forEach((key) => {
                    const level = cachedVipLevels[key];
                    const levelName = level.level_name;
                    const levelCost = parseFloat(level.amount || 0);
                    const dailyEarning = parseFloat(level.daily_earning || 0);

                    const isActive = (activeVipName === levelName);
                    const isPreviouslyBought = unlockedVipList.includes(levelName) && !isActive;
                    const isNotBought = !unlockedVipList.includes(levelName);

                    const cardElement = document.createElement('div');
                    let cardClass = 'vip-card';
                    let btnClass = 'unlock-btn';
                    let btnHtml = '';
                    let badgeIcon = '';
                    let topLeftBadge = '';
                    const safeId = levelName.replace(/\s+/g, '-');

                    if (isActive) {
                        // বর্তমান অ্যাক্টিভ VIP
                        cardClass += ' active-state';
                        btnClass += ' btn-active';
                        btnHtml = '<i class="fa-solid fa-signal"></i> Currently Active';
                        badgeIcon = '<i class="fa-solid fa-signal"></i>';
                        topLeftBadge = '<div class="active-label-badge"><i class="fa-solid fa-circle"></i> ACTIVE NOW</div>';
                    } else if (isPreviouslyBought) {
                        // আগে কিনা হয়েছিল, এখন অ্যাক্টিভ নয় — সুইচ করতে হবে
                        cardClass += ' unlocked-state';
                        btnClass += ' btn-switch';
                        btnHtml = '<i class="fa-solid fa-rotate-left"></i> Switch to This';
                        badgeIcon = '<i class="fa-solid fa-circle-check"></i>';
                        topLeftBadge = '<div class="purchased-label-badge"><i class="fa-solid fa-circle"></i> PURCHASED</div>';
                    } else {
                        // এখনো কেনা হয়নি — নতুন কিনতে হবে
                        cardClass += ' purchase-state';
                        btnClass += ' btn-purchase';
                        btnHtml = '<i class="fa-solid fa-unlock-keyhole"></i> Unlock Level';
                        badgeIcon = '<i class="fa-solid fa-lock-open"></i>';
                    }

                    // লোডিং স্টেট চেক
                    if (loadingButtonId === safeId) {
                        btnClass = 'unlock-btn btn-loading';
                        btnHtml = '<div class="spinner-icon"></div> Processing...';
                    }

                    cardElement.className = cardClass;
                    cardElement.id = `vip-node-card-${safeId}`;
                    
                    cardElement.innerHTML = `
                        ${topLeftBadge}
                        <div class="lock-overlay-badge">${badgeIcon}</div>
                        <div class="card-bg-icon"><i class="fa-solid fa-server"></i></div>
                        <div class="vip-tag">Mining Layer</div>
                        <div class="vip-title">${levelName}</div>
                        <div class="vip-price">${levelCost.toFixed(2)} <span>USDT</span></div>
                        
                        <ul class="vip-features">
                            <li><i class="fa-solid fa-circle-nodes"></i> Daily Earnings: ${dailyEarning.toString()} USDT</li>
                            <li><i class="fa-solid fa-microchip"></i> Node Status: High Performance</li>
                            <li><i class="fa-solid fa-clock"></i> Operation Life: 365 Days</li>
                        </ul>
                        
                        <button class="${btnClass}" id="btn-${safeId}">
                            ${btnHtml}
                        </button>
                    `;
                    
                    gridContainer.appendChild(cardElement);

                    // ক্লিক ইভেন্ট — শুধু লোডিং এ না থাকলে
                    if (!isActive && loadingButtonId !== safeId) {
                        document.getElementById(`btn-${safeId}`).addEventListener('click', () => {
                            executeVipAction(levelName, levelCost);
                        });
                    }
                });
            }

            // --- VIP অ্যাকশন (নতুন কেনা বা সুইচ) ---
            function executeVipAction(levelName, costValue) {
                // যদি ইতিমধ্যে কোনো বাটন লোডিং এ থাকে
                if (loadingButtonId) return;

                // কনফার্মেশন মেসেজ তৈরি
                let confirmMsg = `Do you verify to allocate ${costValue.toFixed(2)} USDT to activate ${levelName}?`;
                
                if (activeVipName && activeVipName !== levelName) {
                    confirmMsg = `Switching to ${levelName} will cancel your current ${activeVipName}.\n\nDo you verify to allocate ${costValue.toFixed(2)} USDT to activate ${levelName}?`;
                }

                const userConfirmation = confirm(confirmMsg);
                if (!userConfirmation) return;

                // ব্যালেন্স চেক
                if (currentAccountBalance < costValue) {
                    showInsufficientBalancePopup(costValue, currentAccountBalance, levelName);
                    return;
                }

                // লোডিং শুরু
                loadingButtonId = levelName.replace(/\s+/g, '-');
                renderVIPGrid();

                const nextBalance = currentAccountBalance - costValue;
                const userRef = database.ref('users/' + currentUserId);
                
                // unlockedVips তে যোগ করা (যদি আগে না থাকে)
                let updatedUnlockedList = [...unlockedVipList];
                if (!updatedUnlockedList.includes(levelName)) {
                    updatedUnlockedList.push(levelName);
                }
                
                userRef.update({
                    balance: Number(nextBalance.toFixed(4)),
                    current_vip: levelName,
                    unlockedVips: updatedUnlockedList
                })
                .then(() => {
                    loadingButtonId = null;
                    showSuccessToast(`${levelName} is now active!`);
                    // renderVIPGrid() রিয়েল-টাইম লিসেনার থেকে অটো কল হবে
                })
                .catch((err) => {
                    console.error("Transaction Error: ", err);
                    loadingButtonId = null;
                    renderVIPGrid();
                    alert("Transaction failed! Please try again.");
                });
            }

            // রান শুরু
            listenToUserStats();
            listenToVIPLevels();
        });

        /* --- Security --- */
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; 
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        };
    </script>
</body>
</html>
