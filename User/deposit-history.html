<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #090a0f;
            --panel-card: #121420;
            --accent-neon: #00ffcc;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --card-border: rgba(255, 255, 255, 0.03);
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            padding: 24px; 
            margin: 0;
            min-height: 100vh;
        }

        /* Top Bar for Balance (Optional Integration) */
        .top-bar {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
        }
        
        .container {
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
        }
        
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 5px; }
        .page-header p { color: var(--text-muted); }
        
        .history-card {
            background: linear-gradient(145deg, #121420 0%, #0e1019 100%);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            width: 100%; 
            box-sizing: border-box; 
            overflow-x: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th { text-align: left; color: var(--text-muted); font-size: 13px; padding: 16px; border-bottom: 1px solid var(--card-border); text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 16px; font-size: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.02); }
        
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255, 255, 255, 0.02); }

        .amount-text { color: var(--accent-neon); font-weight: 600; font-family: monospace; }
        
        .status-pill { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
        .status-pending { background: rgba(255, 204, 0, 0.1); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.2); }
        .status-approved { background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid rgba(0, 255, 204, 0.2); }
        .status-rejected { background: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid rgba(255, 82, 82, 0.2); }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 22px; }
            th, td { padding: 12px; font-size: 13px; }
            .history-card { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1>Deposit History</h1>
            <p>Track your transaction verification status and ledger updates.</p>
        </div>

        <div class="history-card">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Gateway</th>
                        <th>Transaction ID</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 30px;">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Syncing ledger...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cpanel-ebon.vercel.app/Royal%20Task/royaltaskroyaltaskroyaltask.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- ১. Firebase Initialization Safety Check ---
            if (typeof firebaseConfig === 'undefined') {
                console.error("Config Error: firebaseConfig is missing.");
                document.getElementById('history-body').innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ff5252;">Configuration Error: config.js missing</td></tr>`;
                return;
            }

            if (!firebase.apps.length) {
                try {
                    firebase.initializeApp(firebaseConfig);
                } catch (error) {
                    console.error("Firebase Init Error:", error);
                    document.getElementById('history-body').innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ff5252;">System Error: Initialization Failed</td></tr>`;
                    return;
                }
            }

            const database = firebase.database();
            const historyBody = document.getElementById('history-body');

            // --- ২. Login Check & User ID Extraction ---
            function checkLogin() {
                const loggedInUser = localStorage.getItem('currentUser');
                if (!loggedInUser) {
                    window.location.href = "login.html";
                    return null;
                }
                try {
                    const userData = JSON.parse(loggedInUser);
                    return userData.uid; // ইউজারের UID রিটার্ন করছে
                } catch (e) {
                    console.error("User data parse error", e);
                    window.location.href = "login.html";
                    return null;
                }
            }

            const currentUserId = checkLogin();

            // যদি লগইন চেক ফেইল করে বা ইউজার আইডি না পাওয়া যায়, তবে আর এগিয়ে যাবে না
            if (!currentUserId) {
                return; 
            }

            // --- ৩. Fetch Deposit History ---
            // 'orderByChild' ব্যবহার করে নির্দিষ্ট ইউজারের ডাটা ফিল্টার করা হচ্ছে
            database.ref('deposits').orderByChild('user_id').equalTo(currentUserId).on('value', (snapshot) => {
                historyBody.innerHTML = ""; // আগের লোডার বা ডাটা ক্লিয়ার
                
                if (snapshot.exists()) {
                    let depositsArray = [];

                    // ডাটা অ্যারেতে কনভার্ট করা হচ্ছে সোর্ট করার জন্য
                    snapshot.forEach((child) => {
                        const data = child.val();
                        // টাইমস্ট্যাম্প যদি না থাকে, তবে ডিফল্ট 0 দেওয়া হলো
                        const timestamp = data.timestamp || 0;
                        depositsArray.push({ ...data, key: child.key });
                    });

                    // ডিসেন্ডিং অর্ডারে (নতুন আগে) সোর্ট করা হচ্ছে
                    depositsArray.sort((a, b) => b.timestamp - a.timestamp);

                    if (depositsArray.length === 0) {
                        historyBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No deposit records found.</td></tr>`;
                        return;
                    }

                    // HTML রেন্ডার করা হচ্ছে
                    depositsArray.forEach((data) => {
                        const dateObj = new Date(data.timestamp);
                        const dateStr = dateObj.toLocaleDateString();
                        const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        // TxID ছোট করে দেখানো হচ্ছে
                        const shortTxid = data.txid ? data.txid.substring(0, 10) + "..." : "N/A";
                        
                        const row = `
                            <tr>
                                <td>
                                    <div style="font-weight:600;">${dateStr}</div>
                                    <div style="font-size:11px; color:var(--text-muted);">${timeStr}</div>
                                </td>
                                <td>
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        <i class="fa-solid fa-wallet" style="color:var(--text-muted); font-size:12px;"></i>
                                        ${data.method || 'Unknown'}
                                    </div>
                                </td>
                                <td style="font-family:monospace; color:var(--text-muted); font-size:13px;">${shortTxid}</td>
                                <td class="amount-text">$${data.amount.toFixed(2)}</td>
                                <td><span class="status-pill status-${data.status}">${data.status}</span></td>
                            </tr>
                        `;
                        historyBody.insertAdjacentHTML('beforeend', row);
                    });

                } else {
                    historyBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No deposit records found.</td></tr>`;
                }
            }, (error) => {
                console.error("History Fetch Error:", error);
                historyBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ff5252;">Error loading data.</td></tr>`;
            });
        });
    </script>
</body>
</html>
