<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claimed Levels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #07080d;
            --panel-card: #10121c;
            --accent-neon: #00ffcc;
            --accent-dim: #00b38f;
            --text-main: #f1f3f9;
            --text-muted: #6b7590;
            --card-border: rgba(255, 255, 255, 0.04);
            --vip-gold: #ffaa00;
            --danger: #ff3366;
            --success: #00e676;
            --claim-blue: #3b82f6;
            --cooldown-purple: #a855f7;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 24px;
            min-height: 100vh;
            overflow-y: auto;
        }

        body::-webkit-scrollbar { width: 5px; }
        body::-webkit-scrollbar-track { background: var(--bg-body); }
        body::-webkit-scrollbar-thumb { background: #1a1d2e; border-radius: 10px; }

        .page-header { margin-bottom: 30px; }
        .page-header h1 {
            font-size: 28px; font-weight: 800;
            letter-spacing: -0.5px; margin-bottom: 6px;
            background: linear-gradient(135deg, var(--accent-neon), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p { color: var(--text-muted); font-size: 13.5px; line-height: 1.5; }

        .top-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 600px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: var(--panel-card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .stat-box::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat-box.balance-box::after { background: linear-gradient(90deg, transparent, var(--accent-neon), transparent); }
        .stat-box.earning-box::after { background: linear-gradient(90deg, transparent, var(--vip-gold), transparent); }

        .stat-label {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--text-muted);
            font-weight: 600; margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .stat-label i { font-size: 12px; }
        .stat-value {
            font-size: 24px; font-weight: 800;
            letter-spacing: -0.5px;
        }
        .stat-value.neon { color: var(--accent-neon); }
        .stat-value.gold { color: var(--vip-gold); }
        .stat-unit { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-left: 4px; }

        .claim-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 600px;
        }

        .claim-card {
            background: linear-gradient(160deg, #12141f 0%, #0c0d15 100%);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-strip {
            height: 4px;
            width: 100%;
        }
        .card-strip.strip-ready {
            background: linear-gradient(90deg, var(--success), #00c853, var(--success));
            background-size: 200% 100%;
            animation: stripFlow 2s linear infinite;
        }
        .card-strip.strip-cooldown {
            background: linear-gradient(90deg, #2a1a3a, var(--cooldown-purple), #2a1a3a);
        }
        .card-strip.strip-expired {
            background: linear-gradient(90deg, #2a0d15, var(--danger), #2a0d15);
        }

        @keyframes stripFlow {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .card-body { padding: 22px 24px; display: flex; flex-direction: column; flex-grow: 1; }

        .card-top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .card-level-name {
            font-size: 22px; font-weight: 800;
            letter-spacing: -0.3px;
        }
        .card-status-badge {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 4px 10px; border-radius: 6px;
            white-space: nowrap;
        }
        .badge-ready {
            background: rgba(0, 230, 118, 0.12);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.2);
            animation: badgePulse 2s infinite;
        }
        .badge-cooldown {
            background: rgba(168, 85, 247, 0.1);
            color: var(--cooldown-purple);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        .badge-expired {
            background: rgba(255, 51, 102, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .earning-display {
            background: rgba(0, 255, 204, 0.04);
            border: 1px solid rgba(0, 255, 204, 0.08);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: opacity 0.3s;
        }
        .earning-display.dimmed { opacity: 0.3; }
        .earning-left {
            display: flex; align-items: center; gap: 10px;
        }
        .earning-icon-wrap {
            width: 36px; height: 36px;
            background: rgba(0, 255, 204, 0.08);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .earning-icon-wrap i { color: var(--accent-neon); font-size: 15px; }
        .earning-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .earning-amount { font-size: 20px; font-weight: 800; color: var(--accent-neon); margin-top: 2px; }
        .earning-amount .unit { font-size: 11px; font-weight: 500; color: var(--text-muted); }

        .cooldown-section { margin-bottom: 16px; }
        .cooldown-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px;
        }
        .cooldown-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .cooldown-time { font-size: 13px; font-weight: 700; color: var(--cooldown-purple); font-variant-numeric: tabular-nums; }
        .cooldown-time.ready-text { color: var(--success); }
        .cooldown-time.expired-text { color: var(--danger); }

        .cooldown-bar-bg {
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px; overflow: hidden;
        }
        .cooldown-bar-fill {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, var(--cooldown-purple), #c084fc);
            transition: width 1s linear;
        }
        .cooldown-bar-fill.fill-ready {
            background: linear-gradient(90deg, var(--success), #69f0ae);
            width: 100% !important;
        }
        .cooldown-bar-fill.fill-expired {
            background: var(--danger);
            width: 0% !important;
        }

        .card-features {
            display: flex; gap: 16px;
            margin-bottom: 18px;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .feat-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-muted); }
        .feat-item i { font-size: 10px; color: var(--accent-dim); }
        .feat-item.feat-dim { color: #333; }
        .feat-item.feat-dim i { color: #333; }

        .claim-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700; font-size: 13.5px;
            cursor: pointer; border: none;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            transition: all 0.3s ease;
            margin-top: auto;
        }
        .claim-btn.btn-ready {
            background: linear-gradient(135deg, #00e676, #00c853);
            color: #000;
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.2);
        }
        .claim-btn.btn-ready:hover { transform: scale(0.98); box-shadow: 0 8px 25px rgba(0, 230, 118, 0.3); }
        .claim-btn.btn-ready:active { transform: scale(0.95); }

        .claim-btn.btn-cooldown {
            background: rgba(168, 85, 247, 0.08);
            color: var(--cooldown-purple);
            border: 1px solid rgba(168, 85, 247, 0.15);
            cursor: not-allowed;
            pointer-events: none;
        }

        .claim-btn.btn-expired {
            background: rgba(255, 51, 102, 0.06);
            color: var(--danger);
            border: 1px solid rgba(255, 51, 102, 0.12);
            cursor: default;
            pointer-events: none;
        }

        /* এক্সপায়ারড ওভারলে */
        .card-expired-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(7, 8, 13, 0.5);
            border-radius: 20px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .card-expired-overlay .exp-icon {
            width: 52px; height: 52px;
            background: rgba(255, 51, 102, 0.08);
            border: 1px solid rgba(255, 51, 102, 0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .card-expired-overlay .exp-icon i { font-size: 20px; color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon {
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.06);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .empty-icon i { font-size: 30px; color: #333; }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
        .empty-state p { font-size: 13px; color: #444; line-height: 1.5; }

        .toast {
            position: fixed; top: 24px; right: 24px;
            padding: 16px 24px; border-radius: 14px;
            font-size: 13.5px; font-weight: 600;
            z-index: 99999;
            display: flex; align-items: center; gap: 10px;
            transform: translateX(130%);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 12px 35px rgba(0,0,0,0.5);
            max-width: 380px;
        }
        .toast.show { transform: translateX(0); }
        .toast.toast-success {
            background: linear-gradient(145deg, #0d2818, #0e1019);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }
        .toast.toast-success i { color: var(--success); font-size: 18px; }
        .toast.toast-error {
            background: linear-gradient(145deg, #2a0d15, #0e1019);
            border: 1px solid rgba(255, 51, 102, 0.3);
        }
        .toast.toast-error i { color: var(--danger); font-size: 18px; }

        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 5, 9, 0.85);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: all 0.35s ease;
            padding: 16px;
        }
        .popup-overlay.show { opacity: 1; pointer-events: auto; }

        .popup-box {
            background: linear-gradient(145deg, #16192b, #0e1019);
            border: 1px solid rgba(255, 51, 102, 0.2);
            box-shadow: 0 20px 50px rgba(255, 51, 102, 0.08);
            padding: 30px; border-radius: 24px;
            width: 100%; max-width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: all 0.3s ease;
        }
        .popup-overlay.show .popup-box { transform: scale(1); }

        .popup-icon-circle {
            width: 60px; height: 60px;
            background: rgba(255, 51, 102, 0.08);
            border: 1px dashed var(--danger);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
        }
        .popup-icon-circle i { color: var(--danger); font-size: 26px; }
        .popup-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        .popup-text { color: var(--text-muted); font-size: 13.5px; line-height: 1.6; margin-bottom: 24px; }
        .popup-text strong { color: var(--text-main); }
        .popup-dismiss-btn {
            background: linear-gradient(135deg, #ff3366, #cc0044);
            color: #fff; border: none; padding: 12px 28px;
            border-radius: 12px; font-weight: 700; font-size: 13.5px;
            cursor: pointer; width: 100%; transition: all 0.3s;
        }
        .popup-dismiss-btn:hover { opacity: 0.9; }

        .confirm-popup .popup-box {
            border-color: rgba(0, 230, 118, 0.2);
            box-shadow: 0 20px 50px rgba(0, 230, 118, 0.06);
        }
        .confirm-popup .popup-icon-circle {
            background: rgba(0, 230, 118, 0.08);
            border-color: var(--success);
        }
        .confirm-popup .popup-icon-circle i { color: var(--success); }
        .confirm-popup .popup-dismiss-btn {
            background: linear-gradient(135deg, #00e676, #00c853);
            color: #000;
        }
        .confirm-popup .popup-cancel-btn {
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 12px 28px;
            border-radius: 12px; font-weight: 700; font-size: 13.5px;
            cursor: pointer; width: 100%; margin-bottom: 10px;
            transition: all 0.3s;
        }
        .confirm-popup .popup-cancel-btn:hover { background: rgba(255,255,255,0.06); }

        .bg-glow {
            position: fixed; top: -200px; right: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.03) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .page-wrapper { position: relative; z-index: 1; }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .top-stats { grid-template-columns: 1fr; gap: 12px; }
            .claim-grid { grid-template-columns: 1fr; }
            .stat-value { font-size: 20px; }
            .toast { right: 12px; left: 12px; max-width: none; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-glow"></div>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Daily Mining Claim</h1>
            <p>Collect your active VIP earnings every 24 hours. Only your currently active VIP is claimable.</p>
        </div>

        <div class="top-stats">
            <div class="stat-box balance-box">
                <div class="stat-label"><i class="fa-solid fa-wallet"></i> Wallet Balance</div>
                <div class="stat-value neon" id="stat-balance">0.00<span class="stat-unit">USDT</span></div>
            </div>
            <div class="stat-box earning-box">
                <div class="stat-label"><i class="fa-solid fa-coins"></i> Daily Claim Amount</div>
                <div class="stat-value gold" id="stat-daily">0.00<span class="stat-unit">USDT</span></div>
            </div>
        </div>

        <div class="claim-grid" id="claim-grid-container"></div>
    </div>

    <!-- এরর পপআপ -->
    <div class="popup-overlay" id="error-popup">
        <div class="popup-box">
            <div class="popup-icon-circle">
                <i class="fa-solid fa-xmark"></i>
            </div>
            <div class="popup-title" id="error-popup-title">Error</div>
            <div class="popup-text" id="error-popup-text"></div>
            <button class="popup-dismiss-btn" id="error-popup-close">Close</button>
        </div>
    </div>

    <!-- কনফার্ম পপআপ -->
    <div class="popup-overlay confirm-popup" id="confirm-popup">
        <div class="popup-box">
            <div class="popup-icon-circle">
                <i class="fa-solid fa-hand-holding-dollar"></i>
            </div>
            <div class="popup-title">Claim Earnings</div>
            <div class="popup-text" id="confirm-popup-text"></div>
            <button class="popup-cancel-btn" id="confirm-popup-cancel">Cancel</button>
            <button class="popup-dismiss-btn" id="confirm-popup-yes">Confirm Claim</button>
        </div>
    </div>

    <!-- টোস্ট -->
    <div class="toast toast-success" id="toast-success">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-success-msg"></span>
    </div>
    <div class="toast toast-error" id="toast-error">
        <i class="fa-solid fa-circle-xmark"></i>
        <span id="toast-error-msg"></span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cpanel-ebon.vercel.app/Royal%20Task/royaltaskroyaltaskroyaltask.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            function checkLogin() {
                const u = localStorage.getItem('currentUser');
                if (!u) {
                    if (window !== window.top) window.top.location.href = "login.html";
                    else window.location.href = "login.html";
                    return null;
                }
                try { return JSON.parse(u).uid; }
                catch (e) {
                    if (window !== window.top) window.top.location.href = "login.html";
                    else window.location.href = "login.html";
                    return null;
                }
            }

            const uid = checkLogin();
            if (!uid) return;

            if (typeof firebaseConfig === 'undefined') { alert("config.js missing!"); return; }
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // --- স্টেট ---
            let balance = 0;
            let currentVip = null;         // বর্তমানে অ্যাক্টিভ VIP নাম
            let purchaseTs = null;          // VIP পারচেস টাইমস্ট্যাম্প
            let activeRef = 0;              // অ্যাক্টিভ রেফারেল সংখ্যা
            let lastClaimTs = null;         // শেষ ক্লেইম টাইমস্ট্যাম্প
            let vipSettings = {};
            let pendingClaim = null;
            let cdInterval = null;

            // --- DOM ---
            const gridEl = document.getElementById('claim-grid-container');
            const statBalance = document.getElementById('stat-balance');
            const statDaily = document.getElementById('stat-daily');

            // --- হেল্পার ---
            function formatTime(ms) {
                if (ms <= 0) return '00:00:00';
                const t = Math.floor(ms / 1000);
                const h = Math.floor(t / 3600);
                const m = Math.floor((t % 3600) / 60);
                const s = t % 60;
                return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }

            // এক্সপায়ারি টাইমস্ট্যাম্প = পারচেস টাইম + (activeRef × 24 ঘন্টা)
            function getExpiryTs() {
                if (!purchaseTs) return null;
                return purchaseTs + (activeRef * 86400000);
            }

            function isVipExpired() {
                const e = getExpiryTs();
                return e ? e <= Date.now() : true;
            }

            // ২৪ ঘন্টার কুলডাউন বাকি আছে কিনা
            function getCooldownMs() {
                if (!lastClaimTs) return 0;
                const elapsed = Date.now() - lastClaimTs;
                const remaining = 86400000 - elapsed;
                return remaining > 0 ? remaining : 0;
            }

            function isClaimReady() {
                return getCooldownMs() <= 0;
            }

            /**
             * কার্ডের স্টেট নির্ধারণ:
             * - expired: VIP এক্সপায়ার হয়ে গেছে → ক্লেইম নেই
             * - ready: ২৪ ঘন্টা পার হয়েছে → ক্লেইম করা যাবে
             * - cooldown: ২৪ ঘন্টা শেষ হয়নি → অপেক্ষা করতে হবে
             */
            function getCardState() {
                if (!currentVip) return null; // কোনো VIP নেই
                if (isVipExpired()) return 'expired';
                if (!lastClaimTs || isClaimReady()) return 'ready';
                return 'cooldown';
            }

            // --- টোস্ট ---
            function showSuccess(msg) {
                const t = document.getElementById('toast-success');
                document.getElementById('toast-success-msg').innerText = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3500);
            }
            function showError(msg) {
                const t = document.getElementById('toast-error');
                document.getElementById('toast-error-msg').innerText = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3500);
            }

            // --- এরর পপআপ ---
            const errorPopup = document.getElementById('error-popup');
            document.getElementById('error-popup-close').onclick = () => errorPopup.classList.remove('show');
            function showErrorPopup(title, msg) {
                document.getElementById('error-popup-title').innerText = title;
                document.getElementById('error-popup-text').innerHTML = msg;
                errorPopup.classList.add('show');
            }

            // --- কনফার্ম পপআপ ---
            const confirmPopup = document.getElementById('confirm-popup');
            document.getElementById('confirm-popup-cancel').onclick = () => {
                confirmPopup.classList.remove('show');
                pendingClaim = null;
            };
            document.getElementById('confirm-popup-yes').onclick = () => {
                confirmPopup.classList.remove('show');
                if (pendingClaim) executeClaim(pendingClaim);
                pendingClaim = null;
            };
            function showConfirmPopup(amount) {
                document.getElementById('confirm-popup-text').innerHTML =
                    `Claim <strong>${amount.toFixed(2)} USDT</strong> from <strong>${currentVip}</strong> mining node?<br><br>This amount will be added to your wallet balance.`;
                confirmPopup.classList.add('show');
            }

            // --- রিয়েল-টাইম লিসেনার ---
            db.ref('users/' + uid).on('value', snap => {
                if (snap.exists()) {
                    const d = snap.val();
                    balance = parseFloat(d.balance || 0);
                    currentVip = d.current_vip || null;
                    purchaseTs = d.vipPurchaseTimestamp || null;
                    activeRef = parseInt(d.activeReferrals || 0);
                    lastClaimTs = d.lastClaimTimestamp || null;
                    updateStats();
                    renderCard();
                } else {
                    balance = 0; currentVip = null; purchaseTs = null;
                    activeRef = 0; lastClaimTs = null;
                    updateStats(); renderCard();
                }
            });

            db.ref('vip_settings').on('value', snap => {
                if (snap.exists()) {
                    vipSettings = snap.val();
                    updateStats();
                    renderCard();
                }
            });

            // --- স্ট্যাটাস আপডেট ---
            function updateStats() {
                statBalance.innerHTML = `${balance.toFixed(2)}<span class="stat-unit">USDT</span>`;

                let daily = 0;
                if (currentVip && !isVipExpired()) {
                    const key = Object.keys(vipSettings).find(k => vipSettings[k].level_name === currentVip);
                    if (key) daily = parseFloat(vipSettings[key].daily_earning || 0);
                }
                statDaily.innerHTML = `${daily.toFixed(2)}<span class="stat-unit">USDT</span>`;
            }

            // --- কার্ড রেন্ডার ---
            function renderCard() {
                if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }

                const state = getCardState();

                // কোনো VIP না থাকলে বা এক্সপায়ার হলে Empty State
                if (!currentVip || state === 'expired') {
                    const isExp = state === 'expired';
                    gridEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><i class="fa-solid ${isExp ? 'fa-hourglass-end' : 'fa-server'}"></i></div>
                            <h3>${isExp ? 'VIP Expired' : 'No Active VIP'}</h3>
                            <p>${isExp 
                                ? 'Your active VIP has expired. Go to the VIP panel to purchase or repurchase a level.' 
                                : 'You don\'t have any active VIP level.<br>Go to the VIP panel to activate a mining node.'}</p>
                        </div>`;
                    return;
                }

                // VIP সেটিংস খুঁজে বের করা
                const settingKey = Object.keys(vipSettings).find(k => vipSettings[k].level_name === currentVip);
                if (!settingKey) {
                    gridEl.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-gear"></i></div><h3>Configuration Error</h3><p>VIP settings not found.</p></div>`;
                    return;
                }

                const level = vipSettings[settingKey];
                const dailyEarning = parseFloat(level.daily_earning || 0);
                const cooldownMs = getCooldownMs();
                const totalCooldown = 86400000;
                const progressPct = lastClaimTs ? Math.min(100, ((totalCooldown - cooldownMs) / totalCooldown) * 100) : 100;

                let stripClass, badgeClass, badgeText, btnClass, btnHtml;
                let earningDimmed = false;
                let featDimmed = false;

                if (state === 'ready') {
                    stripClass = 'strip-ready';
                    badgeClass = 'badge-ready';
                    badgeText = 'Ready to Claim';
                    btnClass = 'btn-ready';
                    btnHtml = '<i class="fa-solid fa-hand-holding-dollar"></i> Claim Now';
                } else {
                    // cooldown
                    stripClass = 'strip-cooldown';
                    badgeClass = 'badge-cooldown';
                    badgeText = 'Cooldown';
                    btnClass = 'btn-cooldown';
                    btnHtml = `<i class="fa-solid fa-hourglass-half"></i> <span id="btn-timer-text">${formatTime(cooldownMs)}</span>`;
                }

                gridEl.innerHTML = `
                    <div class="claim-card" id="claim-card">
                        <div class="card-strip ${stripClass}"></div>
                        <div class="card-body">
                            <div class="card-top-row">
                                <div class="card-level-name">${currentVip}</div>
                                <div class="card-status-badge ${badgeClass}" id="card-badge">${badgeText}</div>
                            </div>

                            <div class="earning-display ${earningDimmed ? 'dimmed' : ''}" id="earning-box">
                                <div class="earning-left">
                                    <div class="earning-icon-wrap"><i class="fa-solid fa-coins"></i></div>
                                    <div>
                                        <div class="earning-label">Daily Earning</div>
                                        <div class="earning-amount">${dailyEarning.toFixed(2)} <span class="unit">USDT</span></div>
                                    </div>
                                </div>
                            </div>

                            <div class="cooldown-section">
                                <div class="cooldown-header">
                                    <span class="cooldown-label"><i class="fa-regular fa-clock"></i> Next Claim</span>
                                    <span class="cooldown-time ${state === 'ready' ? 'ready-text' : ''}" id="timer-display">
                                        ${state === 'ready' ? 'Available Now' : formatTime(cooldownMs)}
                                    </span>
                                </div>
                                <div class="cooldown-bar-bg">
                                    <div class="cooldown-bar-fill ${state === 'ready' ? 'fill-ready' : ''}" id="progress-bar" style="width: ${progressPct}%"></div>
                                </div>
                            </div>

                            <div class="card-features" id="feat-row">
                                <div class="feat-item ${featDimmed ? 'feat-dim' : ''}"><i class="fa-solid fa-microchip"></i> Active</div>
                                <div class="feat-item ${featDimmed ? 'feat-dim' : ''}"><i class="fa-solid fa-rotate"></i> 24h Cycle</div>
                                <div class="feat-item ${featDimmed ? 'feat-dim' : ''}"><i class="fa-solid fa-shield-halved"></i> Secured</div>
                            </div>

                            <button class="claim-btn ${btnClass}" id="claim-btn" data-amount="${dailyEarning}">
                                ${btnHtml}
                            </button>
                        </div>
                    </div>
                `;

                // ক্লেইম বাটন ইভেন্ট
                if (state === 'ready') {
                    document.getElementById('claim-btn').addEventListener('click', function() {
                        const amt = parseFloat(this.getAttribute('data-amount'));
                        pendingClaim = amt;
                        showConfirmPopup(amt);
                    });
                }

                // কুলডাউন টাইমার শুরু
                if (state === 'cooldown' && cooldownMs > 0) {
                    startCountdown(dailyEarning);
                }
            }

            // --- কুলডাউন টাইমার ---
            function startCountdown(dailyEarning) {
                const timerEl = document.getElementById('timer-display');
                const barEl = document.getElementById('progress-bar');
                const btnEl = document.getElementById('claim-btn');
                const cardEl = document.getElementById('claim-card');
                const badgeEl = document.getElementById('card-badge');
                const stripEl = cardEl ? cardEl.querySelector('.card-strip') : null;
                const btnTimerEl = document.getElementById('btn-timer-text');
                const totalCooldown = 86400000;

                if (!timerEl) return;

                cdInterval = setInterval(() => {
                    const remaining = getCooldownMs();

                    if (remaining <= 0) {
                        clearInterval(cdInterval);
                        cdInterval = null;

                        // Ready স্টেটে পরিবর্তন
                        timerEl.innerText = 'Available Now';
                        timerEl.className = 'cooldown-time ready-text';
                        barEl.className = 'cooldown-bar-fill fill-ready';
                        stripEl.className = 'card-strip strip-ready';
                        badgeEl.className = 'card-status-badge badge-ready';
                        badgeEl.innerText = 'Ready to Claim';

                        btnEl.className = 'claim-btn btn-ready';
                        btnEl.innerHTML = '<i class="fa-solid fa-hand-holding-dollar"></i> Claim Now';
                        btnEl.style.pointerEvents = 'auto';
                        btnEl.style.cursor = 'pointer';

                        btnEl.addEventListener('click', function() {
                            const amt = parseFloat(this.getAttribute('data-amount'));
                            pendingClaim = amt;
                            showConfirmPopup(amt);
                        });
                    } else {
                        timerEl.innerText = formatTime(remaining);
                        if (btnTimerEl) btnTimerEl.innerText = formatTime(remaining);
                        const pct = Math.min(100, ((totalCooldown - remaining) / totalCooldown) * 100);
                        barEl.style.width = pct + '%';
                    }
                }, 1000);
            }

            // --- ক্লেইম এক্সিকিউট ---
            function executeClaim(amount) {
                // ডাবল চেক
                if (isVipExpired()) {
                    showErrorPopup('VIP Expired', 'Your active VIP has expired. You can no longer claim from it.');
                    return;
                }
                if (!isClaimReady()) {
                    showErrorPopup('Cooldown Active', 'Please wait for the 24-hour cooldown to finish.');
                    return;
                }

                const newBalance = balance + amount;
                const userRef = db.ref('users/' + uid);

                userRef.update({
                    balance: Number(newBalance.toFixed(4)),
                    lastClaimTimestamp: Date.now()
                })
                .then(() => {
                    showSuccess(`${currentVip}: +${amount.toFixed(2)} USDT claimed!`);
                })
                .catch(err => {
                    console.error("Claim error:", err);
                    showErrorPopup('Claim Failed', 'Network error occurred. Please try again.');
                });
            }

        });

        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
</body>
</html>
