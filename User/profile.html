<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Terminal Access - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #090a0f;
            --panel-card: #121420;
            --accent-neon: #00ffcc;
            --accent-hover: #00b38f;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --card-border: rgba(255, 255, 255, 0.03);
            --input-bg: #1a1d30;
            --error-color: #ff3366;
            --success-color: #00ffcc;
            --warning-color: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .auth-container {
            width: 100%;
            max-width: 520px;
            background: linear-gradient(145deg, #121420 0%, #0e1019 100%);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 120px;
            height: 120px;
            background: var(--accent-neon);
            opacity: 0.02;
            filter: blur(50px);
            border-radius: 50%;
            pointer-events: none;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-avatar-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        .auth-logo {
            font-size: 45px;
            color: var(--accent-neon);
            width: 90px;
            height: 90px;
            background: var(--input-bg);
            border: 2px solid rgba(0, 255, 204, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            animation: pulse-glow 3s infinite ease-in-out;
        }
        .status-indicator {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 14px;
            height: 14px;
            background: var(--success-color);
            border: 2px solid var(--panel-card);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success-color);
        }
        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }
        .auth-header p {
            color: var(--accent-neon);
            font-size: 11.5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
            font-weight: 600;
        }

        .profile-meta-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }
        .meta-item {
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .meta-item:hover {
            border-color: rgba(0, 255, 204, 0.15);
            background: #1d2137;
        }
        .meta-item.not-clickable {
            cursor: default;
        }
        .meta-item.not-clickable:hover {
            border-color: rgba(255, 255, 255, 0.02);
            background: var(--input-bg);
        }
        .meta-item.cooldown-active {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .meta-item.cooldown-active:hover {
            border-color: rgba(255, 170, 0, 0.2);
            background: rgba(255, 170, 0, 0.03);
        }
        .meta-icon-box {
            width: 36px;
            height: 36px;
            background: rgba(0, 255, 204, 0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-neon);
            font-size: 15px;
            flex-shrink: 0;
        }
        .meta-item.cooldown-active .meta-icon-box {
            background: rgba(255, 170, 0, 0.08);
            color: var(--warning-color);
        }
        .meta-content {
            flex-grow: 1;
            overflow: hidden;
        }
        .meta-label {
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 3px;
            font-weight: 500;
        }
        .meta-value {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 600;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            -webkit-user-select: text;
            user-select: text;
        }
        .meta-edit-hint {
            color: var(--text-muted);
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .meta-item:hover .meta-edit-hint {
            opacity: 1;
        }
        .meta-item.cooldown-active .meta-edit-hint {
            opacity: 1;
            color: var(--warning-color);
            font-size: 10px;
            font-weight: 600;
        }

        .cooldown-badge {
            display: none;
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 170, 0, 0.15);
            border: 1px solid rgba(255, 170, 0, 0.3);
            color: var(--warning-color);
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .meta-item.cooldown-active .cooldown-badge {
            display: block;
        }

        .skeleton {
            background: linear-gradient(90deg, #1a1d30 25%, #242943 50%, #1a1d30 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite;
            border-radius: 4px;
            height: 16px;
            width: 70%;
        }

        .password-reset-btn {
            width: 100%;
            background: transparent;
            color: var(--accent-neon);
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 13px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .password-reset-btn:hover {
            background: rgba(0, 255, 204, 0.05);
            border-color: rgba(0, 255, 204, 0.4);
        }

        .logout-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff3366 0%, #cb1141 100%);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.1);
        }
        .logout-btn:hover {
            transform: scale(0.99);
            opacity: 0.95;
            box-shadow: 0 4px 20px rgba(255, 51, 102, 0.2);
        }

        /* --- Modal Overlay --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* --- Edit Modal (Slide Up) --- */
        .edit-modal {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 520px;
            background: linear-gradient(145deg, #151728 0%, #0e1019 100%);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 30px;
            z-index: 600;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
            max-height: 85vh;
            overflow-y: auto;
        }
        .edit-modal.active {
            transform: translateX(-50%) translateY(0);
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 0 auto 25px auto;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-title i {
            color: var(--accent-neon);
        }
        .modal-input-group {
            margin-bottom: 18px;
        }
        .modal-input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .modal-input-group input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.3s;
            -webkit-user-select: text;
            user-select: text;
        }
        .modal-input-group input:focus {
            border-color: var(--accent-neon);
        }
        .modal-input-group input.input-error {
            border-color: var(--error-color);
        }
        .field-error-msg {
            color: var(--error-color);
            font-size: 11px;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }
        .field-error-msg.visible {
            display: block;
        }

        .password-strength-bar {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.4s ease;
        }
        .password-strength-text {
            font-size: 10px;
            margin-top: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn-cancel {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.08); color: var(--text-main); }
        .btn-save {
            flex: 1.5;
            padding: 14px;
            background: var(--accent-neon);
            color: #090a0f;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-save:hover { background: var(--accent-hover); }
        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* --- Toast Notification --- */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(18, 20, 32, 0.95);
            border: 1px solid var(--card-border);
            padding: 12px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            backdrop-filter: blur(5px);
            max-width: 90vw;
        }
        .toast-notification.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-icon { font-size: 18px; flex-shrink: 0; }
        .toast-message { font-size: 13px; font-weight: 500; }
        
        .toast-notification.success { border-left: 4px solid var(--success-color); }
        .toast-notification.success .toast-icon { color: var(--success-color); }
        .toast-notification.error { border-left: 4px solid var(--error-color); }
        .toast-notification.error .toast-icon { color: var(--error-color); }
        .toast-notification.warning { border-left: 4px solid var(--warning-color); }
        .toast-notification.warning .toast-icon { color: var(--warning-color); }

        /* --- Extra password fields (hidden by default) --- */
        .pw-extra-fields { display: none; }
        .pw-extra-fields.visible { display: block; }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
            50% { transform: scale(1.03); box-shadow: 0 0 30px rgba(0, 255, 204, 0.25); border-color: rgba(0, 255, 204, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        }

        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 480px) {
            .auth-container { padding: 24px; border-radius: 20px; }
            .auth-header h1 { font-size: 21px; }
            .edit-modal { padding: 24px; }
            .toast-notification { padding: 10px 16px; }
            .toast-message { font-size: 12px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toast" class="toast-notification">
        <i id="toast-icon" class="fa-solid fa-circle-check toast-icon"></i>
        <span id="toast-msg" class="toast-message">Operation Successful</span>
    </div>

    <!-- Edit Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay"></div>
    
    <!-- Edit Modal -->
    <div class="edit-modal" id="edit-modal">
        <div class="modal-handle"></div>
        <div class="modal-title">
            <i id="modal-title-icon" class="fa-solid fa-pen-to-square"></i>
            <span id="modal-field-title">Update Field</span>
        </div>

        <!-- Single field mode (for email, phone, name, address) -->
        <div id="single-field-mode">
            <div class="modal-input-group">
                <label id="modal-label">New Value</label>
                <input type="text" id="modal-input" autocomplete="off">
                <div class="field-error-msg" id="single-field-error"></div>
            </div>
        </div>

        <!-- Password change mode (3 fields) -->
        <div id="password-field-mode" class="pw-extra-fields">
            <div class="modal-input-group">
                <label>Current Password</label>
                <input type="password" id="pw-current" autocomplete="current-password" placeholder="Enter current password">
                <div class="field-error-msg" id="pw-current-error"></div>
            </div>
            <div class="modal-input-group">
                <label>New Password</label>
                <input type="password" id="pw-new" autocomplete="new-password" placeholder="Enter new password">
                <div class="password-strength-bar"><div class="password-strength-fill" id="pw-strength-fill"></div></div>
                <div class="password-strength-text" id="pw-strength-text"></div>
                <div class="field-error-msg" id="pw-new-error"></div>
            </div>
            <div class="modal-input-group">
                <label>Re-Type New Password</label>
                <input type="password" id="pw-retype" autocomplete="new-password" placeholder="Re-enter new password">
                <div class="field-error-msg" id="pw-retype-error"></div>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" id="modal-cancel">Cancel</button>
            <button class="btn-save" id="modal-save">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
        </div>
    </div>

    <div class="auth-container">
        
        <div class="auth-header">
            <div class="profile-avatar-wrap">
                <div class="auth-logo"><i class="fa-solid fa-terminal"></i></div>
                <div class="status-indicator"></div>
            </div>
            <h1 id="profile-name-header"><div class="skeleton" style="width: 150px; margin: 0 auto;"></div></h1>
            <p>Active System Operator</p>
        </div>

        <div class="profile-meta-grid">
            
            <div class="meta-item not-clickable">
                <div class="meta-icon-box"><i class="fa-solid fa-id-badge"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Operator UID</div>
                    <div class="meta-value" id="profile-uid"><div class="skeleton" style="width: 85%;"></div></div>
                </div>
            </div>

            <div class="meta-item" data-field="fullName" data-title="Update Full Name" data-label="Enter New Name" data-type="text">
                <div class="meta-icon-box"><i class="fa-solid fa-user"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Full Name</div>
                    <div class="meta-value" id="profile-fullname"><div class="skeleton" style="width: 60%;"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right meta-edit-hint"></i>
            </div>

            <div class="meta-item" id="email-meta-item" data-field="email" data-title="Update Email Node" data-label="Enter New Email Address" data-type="email" data-cooldown="true">
                <div class="meta-icon-box"><i class="fa-solid fa-envelope"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Email Node</div>
                    <div class="meta-value" id="profile-email"><div class="skeleton" style="width: 75%;"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right meta-edit-hint"></i>
                <div class="cooldown-badge" id="email-cooldown-badge">COOLDOWN ACTIVE</div>
            </div>

            <div class="meta-item" id="phone-meta-item" data-field="phone" data-title="Update Phone Number" data-label="Enter New Phone Number" data-type="tel" data-cooldown="true">
                <div class="meta-icon-box"><i class="fa-solid fa-phone"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Secure Phone</div>
                    <div class="meta-value" id="profile-phone"><div class="skeleton" style="width: 50%;"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right meta-edit-hint"></i>
                <div class="cooldown-badge" id="phone-cooldown-badge">COOLDOWN ACTIVE</div>
            </div>

            <div class="meta-item" data-field="address" data-title="Update Physical Address" data-label="Enter New Address" data-type="text">
                <div class="meta-icon-box"><i class="fa-solid fa-location-dot"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Physical Address</div>
                    <div class="meta-value" id="profile-address"><div class="skeleton" style="width: 65%;"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right meta-edit-hint"></i>
            </div>

        </div>

        <button class="password-reset-btn" id="password-reset-trigger">
            <i class="fa-solid fa-key"></i> Change Access Password
        </button>

        <button class="logout-btn" id="logout-trigger-btn">
            <i class="fa-solid fa-power-off"></i> Terminate Session (Log Out)
        </button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cpanel-ebon.vercel.app/Royal%20Task/royaltaskroyaltaskroyaltask.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            if (typeof firebaseConfig === 'undefined') {
                console.error("Configuration Error: config.js not found.");
                showToast("System Configuration Error", "error");
                return;
            }

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            let currentEditField = null;
            let currentUser = null;
            let currentDbData = {};
            let cooldownTimers = { email: null, phone: null };

            // 7 days in milliseconds
            const COOLDOWN_MS = 7 * 24 * 60 * 60 * 1000;

            // --- Elements ---
            const modalOverlay = document.getElementById('modal-overlay');
            const editModal = document.getElementById('edit-modal');
            const modalFieldTitle = document.getElementById('modal-field-title');
            const modalTitleIcon = document.getElementById('modal-title-icon');
            const modalLabel = document.getElementById('modal-label');
            const modalInput = document.getElementById('modal-input');
            const btnCancel = document.getElementById('modal-cancel');
            const btnSave = document.getElementById('modal-save');
            const singleFieldMode = document.getElementById('single-field-mode');
            const passwordFieldMode = document.getElementById('password-field-mode');
            const singleFieldError = document.getElementById('single-field-error');

            const pwCurrent = document.getElementById('pw-current');
            const pwNew = document.getElementById('pw-new');
            const pwRetype = document.getElementById('pw-retype');
            const pwCurrentError = document.getElementById('pw-current-error');
            const pwNewError = document.getElementById('pw-new-error');
            const pwRetypeError = document.getElementById('pw-retype-error');
            const pwStrengthFill = document.getElementById('pw-strength-fill');
            const pwStrengthText = document.getElementById('pw-strength-text');

            // --- Toast UI Helper ---
            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toast-msg');
                const toastIcon = document.getElementById('toast-icon');

                toastMsg.textContent = message;
                toast.className = `toast-notification ${type} active`;

                if (type === 'success') {
                    toastIcon.className = 'fa-solid fa-circle-check toast-icon';
                } else if (type === 'error') {
                    toastIcon.className = 'fa-solid fa-circle-exclamation toast-icon';
                } else if (type === 'warning') {
                    toastIcon.className = 'fa-solid fa-triangle-exclamation toast-icon';
                }

                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => { toast.classList.remove('active'); }, 3500);
            }

            // --- Cooldown Logic ---
            function getCooldownRemaining(field) {
                const key = `cooldown_${field}_${currentUser.uid}`;
                const stored = localStorage.getItem(key);
                if (!stored) return 0;
                const timestamp = parseInt(stored, 10);
                const remaining = timestamp + COOLDOWN_MS - Date.now();
                return remaining > 0 ? remaining : 0;
            }

            function setCooldown(field) {
                const key = `cooldown_${field}_${currentUser.uid}`;
                localStorage.setItem(key, Date.now().toString());
            }

            function formatCooldown(ms) {
                const totalSeconds = Math.floor(ms / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                if (days > 0) return `${days}d ${hours}h remaining`;
                if (hours > 0) return `${hours}h ${minutes}m remaining`;
                return `${minutes}m remaining`;
            }

            function updateCooldownUI(field) {
                const remaining = getCooldownRemaining(field);
                const metaItem = document.getElementById(`${field}-meta-item`);
                const badge = document.getElementById(`${field}-cooldown-badge`);

                if (!metaItem || !badge) return;

                if (remaining > 0) {
                    metaItem.classList.add('cooldown-active');
                    badge.textContent = formatCooldown(remaining).toUpperCase();
                } else {
                    metaItem.classList.remove('cooldown-active');
                    badge.textContent = 'COOLDOWN ACTIVE';
                    // Clean up localStorage
                    const key = `cooldown_${field}_${currentUser.uid}`;
                    localStorage.removeItem(key);
                    if (cooldownTimers[field]) {
                        clearInterval(cooldownTimers[field]);
                        cooldownTimers[field] = null;
                    }
                }
            }

            function startCooldownTimer(field) {
                if (cooldownTimers[field]) clearInterval(cooldownTimers[field]);
                updateCooldownUI(field);

                cooldownTimers[field] = setInterval(() => {
                    const remaining = getCooldownRemaining(field);
                    if (remaining <= 0) {
                        updateCooldownUI(field);
                        clearInterval(cooldownTimers[field]);
                        cooldownTimers[field] = null;
                    } else {
                        const badge = document.getElementById(`${field}-cooldown-badge`);
                        if (badge) badge.textContent = formatCooldown(remaining).toUpperCase();
                    }
                }, 10000); // Update every 10 seconds
            }

            // --- Password Strength Checker ---
            function checkPasswordStrength(password) {
                let score = 0;
                if (password.length >= 6) score++;
                if (password.length >= 8) score++;
                if (/[A-Z]/.test(password)) score++;
                if (/[0-9]/.test(password)) score++;
                if (/[^A-Za-z0-9]/.test(password)) score++;
                return score; // 0-5
            }

            function updateStrengthUI(score) {
                const percent = (score / 5) * 100;
                pwStrengthFill.style.width = percent + '%';

                if (score === 0) {
                    pwStrengthFill.style.background = 'transparent';
                    pwStrengthText.textContent = '';
                    pwStrengthText.style.color = 'transparent';
                } else if (score <= 2) {
                    pwStrengthFill.style.background = '#ff3366';
                    pwStrengthText.textContent = 'WEAK';
                    pwStrengthText.style.color = '#ff3366';
                } else if (score <= 3) {
                    pwStrengthFill.style.background = '#ffaa00';
                    pwStrengthText.textContent = 'MEDIUM';
                    pwStrengthText.style.color = '#ffaa00';
                } else {
                    pwStrengthFill.style.background = '#00ffcc';
                    pwStrengthText.textContent = 'STRONG';
                    pwStrengthText.style.color = '#00ffcc';
                }
            }

            pwNew.addEventListener('input', () => {
                const score = checkPasswordStrength(pwNew.value);
                updateStrengthUI(score);
                clearFieldError(pwNew, pwNewError);
                if (pwRetype.value) clearFieldError(pwRetype, pwRetypeError);
            });
            pwCurrent.addEventListener('input', () => clearFieldError(pwCurrent, pwCurrentError));
            pwRetype.addEventListener('input', () => clearFieldError(pwRetype, pwRetypeError));

            // --- Field Error Helpers ---
            function showFieldError(inputEl, errorEl, msg) {
                inputEl.classList.add('input-error');
                errorEl.textContent = msg;
                errorEl.classList.add('visible');
            }
            function clearFieldError(inputEl, errorEl) {
                inputEl.classList.remove('input-error');
                errorEl.textContent = '';
                errorEl.classList.remove('visible');
            }
            function clearAllPwErrors() {
                clearFieldError(pwCurrent, pwCurrentError);
                clearFieldError(pwNew, pwNewError);
                clearFieldError(pwRetype, pwRetypeError);
            }

            // --- Modal Controls ---
            function openModal(field, title, label, currentValue, type) {
                currentEditField = field;
                modalFieldTitle.textContent = title;
                modalTitleIcon.className = 'fa-solid fa-pen-to-square';

                // Reset states
                clearAllPwErrors();
                clearFieldError(modalInput, singleFieldError);
                pwCurrent.value = '';
                pwNew.value = '';
                pwRetype.value = '';
                updateStrengthUI(0);

                if (field === 'password') {
                    // Password change mode
                    singleFieldMode.style.display = 'none';
                    passwordFieldMode.classList.add('visible');
                    modalTitleIcon.className = 'fa-solid fa-shield-halved';
                } else {
                    // Single field mode
                    singleFieldMode.style.display = 'block';
                    passwordFieldMode.classList.remove('visible');
                    modalLabel.textContent = label;
                    modalInput.value = currentValue || '';
                    modalInput.type = type;
                }

                modalOverlay.classList.add('active');
                editModal.classList.add('active');

                setTimeout(() => {
                    if (field === 'password') {
                        pwCurrent.focus();
                    } else {
                        modalInput.focus();
                    }
                }, 350);
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                editModal.classList.remove('active');
                currentEditField = null;
            }

            modalOverlay.addEventListener('click', closeModal);
            btnCancel.addEventListener('click', closeModal);

            // --- Attach Click Events to Editable Fields ---
            document.querySelectorAll('.meta-item[data-field]').forEach(item => {
                item.addEventListener('click', (e) => {
                    const field = item.getAttribute('data-field');
                    const hasCooldown = item.getAttribute('data-cooldown') === 'true';

                    // Check cooldown
                    if (hasCooldown && currentUser) {
                        const remaining = getCooldownRemaining(field);
                        if (remaining > 0) {
                            showToast(`Cannot change ${field}. ${formatCooldown(remaining)} left.`, "warning");
                            return;
                        }
                    }

                    if (field === 'password') {
                        openModal('password', 'Change Access Password', '', '', 'password');
                        return;
                    }

                    const title = item.getAttribute('data-title');
                    const label = item.getAttribute('data-label');
                    const type = item.getAttribute('data-type');
                    
                    const valueEl = document.getElementById(`profile-${field === 'fullName' ? 'fullname' : field}`);
                    const currentValue = valueEl ? valueEl.textContent : '';
                    
                    openModal(field, title, label, currentValue !== 'N/A' ? currentValue : '', type);
                });
            });

            // --- Save Changes Logic ---
            btnSave.addEventListener('click', () => {
                if (currentEditField === 'password') {
                    handlePasswordChange();
                } else {
                    handleFieldChange();
                }
            });

            function handleFieldChange() {
                const newValue = modalInput.value.trim();
                if (!newValue) {
                    showFieldError(modalInput, singleFieldError, "This field cannot be empty.");
                    return;
                }
                clearFieldError(modalInput, singleFieldError);

                // Email Validation
                if (currentEditField === 'email') {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(newValue)) {
                        showFieldError(modalInput, singleFieldError, "Please enter a valid email address.");
                        return;
                    }
                    if (newValue.toLowerCase() === (currentUser.email || '').toLowerCase()) {
                        showFieldError(modalInput, singleFieldError, "New email must be different from current email.");
                        return;
                    }
                }

                // Phone Validation
                if (currentEditField === 'phone') {
                    const phoneClean = newValue.replace(/[\s\-\+\(\)]/g, '');
                    if (!/^\d{7,15}$/.test(phoneClean)) {
                        showFieldError(modalInput, singleFieldError, "Please enter a valid phone number (7-15 digits).");
                        return;
                    }
                    if (newValue === (currentDbData.phone || '')) {
                        showFieldError(modalInput, singleFieldError, "New phone number must be different.");
                        return;
                    }
                }

                btnSave.disabled = true;
                btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';

                if (currentEditField === 'email') {
                    currentUser.updateEmail(newValue).then(() => {
                        return db.collection("users").doc(currentUser.uid).update({ email: newValue });
                    }).then(() => {
                        document.getElementById('profile-email').textContent = newValue;
                        currentDbData.email = newValue;
                        setCooldown('email');
                        startCooldownTimer('email');
                        showToast("Email Node updated successfully.", "success");
                        closeModal();
                    }).catch((error) => {
                        console.error(error);
                        if (error.code === 'auth/email-already-in-use') {
                            showFieldError(modalInput, singleFieldError, "This email is already registered.");
                        } else if (error.code === 'auth/requires-recent-login') {
                            showToast("Security: Please log out and log in again to change email.", "error");
                        } else {
                            showToast("You can not change your email address.", "error");
                        }
                    }).finally(() => resetSaveBtn());
                } else if (currentEditField === 'phone') {
                    db.collection("users").doc(currentUser.uid).update({ phone: newValue })
                    .then(() => {
                        document.getElementById('profile-phone').textContent = newValue;
                        currentDbData.phone = newValue;
                        setCooldown('phone');
                        startCooldownTimer('phone');
                        showToast("Phone number updated successfully.", "success");
                        closeModal();
                    }).catch((error) => {
                        console.error(error);
                        showToast("Network error. Failed to update phone.", "error");
                    }).finally(() => resetSaveBtn());
                } else {
                    // Firestore Data Update (Name, Address)
                    const updateData = { [currentEditField]: newValue };
                    db.collection("users").doc(currentUser.uid).update(updateData)
                    .then(() => {
                        const targetId = currentEditField === 'fullName' ? 'profile-fullname' : `profile-${currentEditField}`;
                        document.getElementById(targetId).textContent = newValue;
                        
                        if (currentEditField === 'fullName') {
                            document.getElementById('profile-name-header').textContent = newValue;
                        }
                        
                        currentDbData[currentEditField] = newValue;
                        showToast("Matrix data updated successfully.", "success");
                        closeModal();
                    }).catch((error) => {
                        console.error(error);
                        showToast("Network error. Failed to update.", "error");
                    }).finally(() => resetSaveBtn());
                }
            }

            function handlePasswordChange() {
                clearAllPwErrors();
                const currentPw = pwCurrent.value;
                const newPw = pwNew.value;
                const retypePw = pwRetype.value;
                let hasError = false;

                if (!currentPw) {
                    showFieldError(pwCurrent, pwCurrentError, "Current password is required.");
                    hasError = true;
                }
                if (!newPw) {
                    showFieldError(pwNew, pwNewError, "New password is required.");
                    hasError = true;
                } else if (newPw.length < 6) {
                    showFieldError(pwNew, pwNewError, "Password must be at least 6 characters.");
                    hasError = true;
                }
                if (!retypePw) {
                    showFieldError(pwRetype, pwRetypeError, "Please re-type new password.");
                    hasError = true;
                } else if (newPw && newPw !== retypePw) {
                    showFieldError(pwRetype, pwRetypeError, "Passwords do not match.");
                    hasError = true;
                }
                if (newPw && currentPw && newPw === currentPw) {
                    showFieldError(pwNew, pwNewError, "New password must be different from current.");
                    hasError = true;
                }

                if (hasError) return;

                btnSave.disabled = true;
                btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Changing...';

                // Re-authenticate user first, then update password
                const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, currentPw);
                currentUser.reauthenticateWithCredential(credential)
                .then(() => {
                    return currentUser.updatePassword(newPw);
                })
                .then(() => {
                    showToast("Password changed successfully.", "success");
                    closeModal();
                })
                .catch((error) => {
                    console.error(error);
                    if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        showFieldError(pwCurrent, pwCurrentError, "Current password is incorrect.");
                    } else if (error.code === 'auth/too-many-requests') {
                        showToast("Too many attempts. Try again later.", "error");
                    } else if (error.code === 'auth/weak-password') {
                        showFieldError(pwNew, pwNewError, "Password is too weak.");
                    } else {
                        showToast("Failed to change password. Try again.", "error");
                    }
                })
                .finally(() => resetSaveBtn());
            }

            function resetSaveBtn() {
                btnSave.disabled = false;
                btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
            }

            // --- Password Change Button ---
            document.getElementById('password-reset-trigger').addEventListener('click', () => {
                openModal('password', 'Change Access Password', '', '', 'password');
            });

            // --- Monitor Auth State ---
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    fetchOperatorData(user);
                } else {
                    showToast("No active session. Redirecting...", "error");
                    setTimeout(() => { window.location.href = "login.html"; }, 1500);
                }
            });

            // --- Fetch & Render Data ---
            function fetchOperatorData(user) {
                db.collection("users").doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            currentDbData = data;
                            
                            document.getElementById('profile-name-header').textContent = data.fullName || "Unknown Operator";
                            document.getElementById('profile-uid').textContent = user.uid;
                            document.getElementById('profile-fullname').textContent = data.fullName || "N/A";
                            document.getElementById('profile-email').textContent = data.email || user.email || "N/A";
                            document.getElementById('profile-phone').textContent = data.phone || "N/A";
                            document.getElementById('profile-address').textContent = data.address || "N/A";

                            // Initialize cooldown timers for email and phone
                            startCooldownTimer('email');
                            startCooldownTimer('phone');
                        } else {
                            showToast("Operator database node missing.", "error");
                            document.getElementById('profile-uid').textContent = user.uid;
                            document.getElementById('profile-email').textContent = user.email;
                            startCooldownTimer('email');
                            startCooldownTimer('phone');
                        }
                    })
                    .catch((error) => {
                        console.error("Database Error:", error);
                        showToast("Error retrieving network matrix data.", "error");
                    });
            }

            // --- Logout ---
            document.getElementById('logout-trigger-btn').addEventListener('click', () => {
                auth.signOut()
                    .then(() => {
                        showToast("Session terminated successfully.", "success");
                        setTimeout(() => { window.location.href = "login.html"; }, 1500);
                    })
                    .catch(() => {
                        showToast("Logout failed.", "error");
                    });
            });

            // Enter key support
            modalInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') btnSave.click();
            });
            pwCurrent.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') pwNew.focus();
            });
            pwNew.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') pwRetype.focus();
            });
            pwRetype.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') btnSave.click();
            });
        });
    </script>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        setInterval(function() {
            const start = new Date().getTime();
            debugger; 
            if (new Date().getTime() - start > 100) {
                document.body.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#090a0f; color:#ff3366; font-size:20px; font-weight:700; flex-direction:column; gap:15px;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:40px;"></i>
                        <div>[Security Rule Triggered: Execution Paused]</div>
                    </div>`;
            }
        }, 2000);
    </script>
</body>
