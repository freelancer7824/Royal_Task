<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Terminal Access - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Dark Premium Theme Palette --- */
        :root {
            --bg-body: #090a0f;
            --panel-card: #121420;
            --accent-neon: #00ffcc;
            --accent-hover: #00b38f;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --card-border: rgba(255, 255, 255, 0.03);
            --input-bg: #1a1d30;
            --error-color: #ff3366;
            --success-color: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        /* --- Profile Card Matrix Wrap --- */
        .auth-container {
            width: 100%;
            max-width: 520px;
            background: linear-gradient(145deg, #121420 0%, #0e1019 100%);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 120px;
            height: 120px;
            background: var(--accent-neon);
            opacity: 0.02;
            filter: blur(50px);
            border-radius: 50%;
            pointer-events: none;
        }

        /* --- Brand Header Section --- */
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-avatar-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        .auth-logo {
            font-size: 45px;
            color: var(--accent-neon);
            width: 90px;
            height: 90px;
            background: var(--input-bg);
            border: 2px solid rgba(0, 255, 204, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            animation: pulse-glow 3s infinite ease-in-out;
        }
        .status-indicator {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 14px;
            height: 14px;
            background: var(--success-color);
            border: 2px solid var(--panel-card);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success-color);
        }
        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }
        .auth-header p {
            color: var(--accent-neon);
            font-size: 11.5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
            font-weight: 600;
        }

        /* --- Profile Data Display Grid --- */
        .profile-meta-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }
        .meta-item {
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }
        .meta-item:hover {
            border-color: rgba(0, 255, 204, 0.1);
            background: #1d2137;
        }
        .meta-icon-box {
            width: 36px;
            height: 36px;
            background: rgba(0, 255, 204, 0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-neon);
            font-size: 15px;
            flex-shrink: 0;
        }
        .meta-content {
            flex-grow: 1;
            overflow: hidden;
        }
        .meta-label {
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 3px;
            font-weight: 500;
        }
        .meta-value {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 600;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            -webkit-user-select: text;
            user-select: text;
        }

        /* --- Loading State Skeleton --- */
        .skeleton {
            background: linear-gradient(90deg, #1a1d30 25%, #242943 50%, #1a1d30 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite;
            border-radius: 4px;
            height: 16px;
            width: 70%;
        }

        /* --- Log Out Trigger Button --- */
        .logout-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff3366 0%, #cb1141 100%);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.1);
        }
        .logout-btn:hover {
            transform: scale(0.99);
            opacity: 0.95;
            box-shadow: 0 4px 20px rgba(255, 51, 102, 0.2);
        }

        /* --- Toast Notification --- */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(18, 20, 32, 0.95);
            border: 1px solid var(--card-border);
            padding: 12px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .toast-notification.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-icon { font-size: 18px; }
        .toast-message { font-size: 13px; font-weight: 500; }
        
        .toast-notification.success { border-left: 4px solid var(--success-color); }
        .toast-notification.success .toast-icon { color: var(--success-color); }
        .toast-notification.error { border-left: 4px solid var(--error-color); }
        .toast-notification.error .toast-icon { color: var(--error-color); }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
            50% { transform: scale(1.03); box-shadow: 0 0 30px rgba(0, 255, 204, 0.25); border-color: rgba(0, 255, 204, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        }

        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- RESPONSIVE OPTIMIZATION --- */
        @media (max-width: 480px) {
            .auth-container { padding: 24px; border-radius: 20px; }
            .auth-header h1 { font-size: 21px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toast" class="toast-notification">
        <i id="toast-icon" class="fa-solid fa-circle-check toast-icon"></i>
        <span id="toast-msg" class="toast-message">Operation Successful</span>
    </div>

    <div class="auth-container">
        
        <div class="auth-header">
            <div class="profile-avatar-wrap">
                <div class="auth-logo"><i class="fa-solid fa-terminal"></i></div>
                <div class="status-indicator"></div>
            </div>
            <h1 id="profile-name-header"><div class="skeleton" style="width: 150px; margin: 0 auto;"></div></h1>
            <p>Active System Operator</p>
        </div>

        <div class="profile-meta-grid">
            
            <div class="meta-item">
                <div class="meta-icon-box"><i class="fa-solid fa-id-badge"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Operator UID</div>
                    <div class="meta-value" id="profile-uid"><div class="skeleton" style="width: 85%;"></div></div>
                </div>
            </div>

            <div class="meta-item">
                <div class="meta-icon-box"><i class="fa-solid fa-user"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Full Name</div>
                    <div class="meta-value" id="profile-fullname"><div class="skeleton" style="width: 60%;"></div></div>
                </div>
            </div>

            <div class="meta-item">
                <div class="meta-icon-box"><i class="fa-solid fa-envelope"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Email Node</div>
                    <div class="meta-value" id="profile-email"><div class="skeleton" style="width: 75%;"></div></div>
                </div>
            </div>

            <div class="meta-item">
                <div class="meta-icon-box"><i class="fa-solid fa-phone"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Secure Phone</div>
                    <div class="meta-value" id="profile-phone"><div class="skeleton" style="width: 50%;"></div></div>
                </div>
            </div>

            <div class="meta-item">
                <div class="meta-icon-box"><i class="fa-solid fa-location-dot"></i></div>
                <div class="meta-content">
                    <div class="meta-label">Physical Address</div>
                    <div class="meta-value" id="profile-address"><div class="skeleton" style="width: 65%;"></div></div>
                </div>
            </div>

        </div>

        <button class="logout-btn" id="logout-trigger-btn">
            <i class="fa-solid fa-power-off"></i> Terminate Session (Log Out)
        </button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            if (typeof firebaseConfig === 'undefined') {
                console.error("Configuration Error: config.js not found.");
                showToast("System Configuration Error", "error");
                return;
            }

            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            // --- Toast UI Helper ---
            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toast-msg');
                const toastIcon = document.getElementById('toast-icon');

                toastMsg.textContent = message;
                toast.className = `toast-notification ${type} active`;
                toastIcon.className = type === 'success' ? 'fa-solid fa-circle-check toast-icon' : 'fa-solid fa-circle-exclamation toast-icon';

                setTimeout(() => { toast.classList.remove('active'); }, 3000);
            }

            // --- Monitor Authentication State Change ---
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // ইউজার লগইন অবস্থায় থাকলে Firestore থেকে ডেটা আনা শুরু করবে
                    fetchOperatorData(user);
                } else {
                    // ইউজার লগইন না থাকলে সরাসরি login.html এ পাঠিয়ে দিবে
                    showToast("No active session. Redirecting...", "error");
                    setTimeout(() => { window.location.href = "login.html"; }, 1500);
                }
            });

            // --- Fetch & Render Firestore Data ---
            function fetchOperatorData(user) {
                db.collection("users").doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            
                            // UI এলিমেন্টগুলোতে ডেটা অ্যাসাইন করা হচ্ছে
                            document.getElementById('profile-name-header').textContent = data.fullName || "Unknown Operator";
                            document.getElementById('profile-uid').textContent = user.uid;
                            document.getElementById('profile-fullname').textContent = data.fullName || "N/A";
                            document.getElementById('profile-email').textContent = data.email || user.email || "N/A";
                            document.getElementById('profile-phone').textContent = data.phone || "N/A";
                            document.getElementById('profile-address').textContent = data.address || "N/A";
                        } else {
                            // ইন কেস যদি ফায়ারবেস অথেন্টিকেশনে অ্যাকাউন্ট থাকে কিন্তু ফায়ারস্টোরে ডকুমেন্ট না থাকে
                            showToast("Operator database node missing.", "error");
                            document.getElementById('profile-uid').textContent = user.uid;
                            document.getElementById('profile-email').textContent = user.email;
                        }
                    })
                    .catch((error) => {
                        console.error("Database Error:", error);
                        showToast("Error retrieving network matrix data.", "error");
                    });
            }

            // --- Logout Event Handler ---
            document.getElementById('logout-trigger-btn').addEventListener('click', () => {
                auth.signOut()
                    .then(() => {
                        showToast("Session terminated successfully.", "success");
                        setTimeout(() => { window.location.href = "login.html"; }, 1500);
                    })
                    .catch((error) => {
                        showToast("Logout failed.", "error");
                    });
            });
        });
    </script>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        setInterval(function() {
            const start = new Date().getTime();
            debugger; 
            if (new Date().getTime() - start > 100) {
                document.body.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#090a0f; color:#ff3366; font-size:20px; font-weight:700; flex-direction:column; gap:15px;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:40px;"></i>
                        <div>[Security Rule Triggered: Execution Paused]</div>
                    </div>`;
            }
        }, 2000);
    </script>
</body>
</html>
