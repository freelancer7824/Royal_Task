<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonus Chain · Signup + Daily</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }
        body {
            background: #090a0f;
            color: #f1f3f9;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 820px;
            width: 100%;
            background: #121420;
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 32px;
            padding: 30px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i {
            color: #ffb347;
        }
        .badge-date {
            background: rgba(255,180,50,0.12);
            color: #ffb347;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(255,180,50,0.15);
        }
        .bonus-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 20px 0 24px;
        }
        .bonus-item {
            background: #181c2e;
            border-radius: 20px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
            flex-wrap: wrap;
            gap: 14px;
        }
        .bonus-item:hover {
            border-color: rgba(255,180,50,0.12);
            background: #1c2035;
        }
        .bonus-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .bonus-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,180,50,0.08);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #ffb347;
            border: 1px solid rgba(255,180,50,0.06);
        }
        .bonus-info h4 {
            font-size: 16px;
            font-weight: 600;
        }
        .bonus-info .sub {
            font-size: 12px;
            color: #8a94a6;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .bonus-info .sub i {
            font-size: 10px;
            color: #ffb347;
        }
        .bonus-amount {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: rgba(255,255,255,0.04);
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .bonus-amount .unit {
            font-size: 12px;
            font-weight: 500;
            color: #ffb347;
        }
        .bonus-status {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .status-badge {
            font-size: 12px;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 500;
            background: rgba(255,255,255,0.04);
            color: #8a94a6;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge.claimed {
            background: rgba(0,255,204,0.08);
            color: #00ffcc;
            border: 1px solid rgba(0,255,204,0.1);
        }
        .status-badge.ready {
            background: rgba(255,180,50,0.1);
            color: #ffb347;
            border: 1px solid rgba(255,180,50,0.12);
        }
        .status-badge.locked {
            background: rgba(255,70,70,0.06);
            color: #ff6b6b;
            border: 1px solid rgba(255,70,70,0.08);
        }
        .claim-small-btn {
            background: linear-gradient(135deg, #ffb347, #f57c00);
            border: none;
            color: #0b0e1a;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(255,180,50,0.15);
        }
        .claim-small-btn:hover:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 6px 20px rgba(255,180,50,0.25);
        }
        .claim-small-btn:disabled {
            background: #2a2f47;
            color: #6a6f87;
            cursor: not-allowed;
            box-shadow: none;
        }
        .claim-small-btn .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .claim-small-btn.loading .spinner { display: inline-block; }
        .claim-small-btn.loading .btn-label { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .chain-note {
            background: rgba(255,180,50,0.04);
            border-radius: 14px;
            padding: 12px 18px;
            border-left: 3px solid #ffb347;
            font-size: 13px;
            color: #b0b8cc;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 14px 0 16px;
        }
        .chain-note i {
            color: #ffb347;
            font-size: 16px;
        }
        .chain-note strong {
            color: #fff;
        }

        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: #1a1d30;
            border: 1px solid rgba(255,180,50,0.15);
            border-radius: 14px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f1f3f9;
            font-size: 13px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            min-width: 220px;
        }
        .toast.success { border-color: #00ff66; }
        .toast.success i { color: #00ff66; }
        .toast.error { border-color: #ff4444; }
        .toast.error i { color: #ff4444; }
        .toast.info { border-color: #ffb347; }
        .toast.info i { color: #ffb347; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .card { padding: 20px; }
            .bonus-item { flex-direction: column; align-items: stretch; }
            .bonus-left { flex-wrap: wrap; }
            .bonus-status { justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="card">
        <div class="header">
            <h1><i class="fa-solid fa-trophy"></i> Bonus List</h1>
            <span class="badge-date" id="dateBadge"><i class="fa-regular fa-calendar"></i> Today</span>
        </div>

        <!-- Bonus list (signup + daily) serial -->
        <div class="bonus-grid" id="bonusGrid">
            <!-- dynamic from js -->
        </div>

        <!-- Chain note -->
        <div class="chain-note">
            <i class="fa-solid fa-link"></i>
            <span><strong>Serial rule:</strong> Signup bonus for new account. Daily bonus resets every day. Claim each in order.</span>
        </div>

        <div style="text-align:center; font-size:12px; color:#5a607a; margin-top:6px;">
            <i class="fa-regular fa-circle-check"></i> Bonus claimed status is saved per user
        </div>
    </div>

    <!-- Firebase & config -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cpanel-ebon.vercel.app/Royal%20Task/royaltaskroyaltaskroyaltask.js"></script>

    <script>
        (function() {
            // --- init firebase ---
            if (typeof firebaseConfig === 'undefined') {
                console.error("Firebase config missing");
                return;
            }
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const db = firebase.database();

            // --- toast ---
            const toastContainer = document.getElementById('toastContainer');
            function showToast(msg, type='info') {
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                const icon = type === 'success' ? 'fa-circle-check' : type === 'error' ? 'fa-circle-xmark' : 'fa-circle-info';
                t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
                toastContainer.appendChild(t);
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translateX(20px)';
                    setTimeout(() => t.remove(), 300);
                }, 4000);
            }

            // --- get current user ---
            let currentUid = null;
            try {
                const raw = localStorage.getItem('currentUser');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    currentUid = parsed.uid;
                }
            } catch(e) {}

            if (!currentUid) {
                window.location.href = "login.html";
                return;
            }

            // --- state ---
            const todayStr = new Date().toISOString().split('T')[0];
            let signupClaimed = false;       // has this user claimed signup bonus?
            let dailyClaimed = false;        // claimed daily bonus today?
            let dailyLastDate = '';          // last daily claim date

            // DOM
            const bonusGrid = document.getElementById('bonusGrid');
            const dateBadge = document.getElementById('dateBadge');
            dateBadge.innerHTML = `<i class="fa-regular fa-calendar"></i> ${todayStr}`;

            // --- load user data ---
            function loadUserData() {
                db.ref('users/' + currentUid).once('value').then((snap) => {
                    if (snap.exists()) {
                        const data = snap.val();
                        signupClaimed = data.signupClaimed || false;
                        dailyClaimed = data.dailyClaimed || false;
                        dailyLastDate = data.dailyLastDate || '';
                    } else {
                        signupClaimed = false;
                        dailyClaimed = false;
                        dailyLastDate = '';
                    }
                    renderBonuses();
                }).catch(err => {
                    console.warn(err);
                    renderBonuses();
                });
            }

            // --- render bonus list (signup + daily) ---
            function renderBonuses() {
                // Signup bonus: 1 USDT, once per ID
                const signupStatus = signupClaimed ? 'claimed' : 'ready';
                const signupLabel = signupClaimed ? 'Claimed' : 'Claim now';
                const signupDisabled = signupClaimed;

                // Daily bonus: 0.20 USDT, resets daily
                const dailyAvailable = !dailyClaimed || (dailyLastDate !== todayStr);
                const dailyStatus = dailyAvailable ? 'ready' : 'claimed';
                const dailyLabel = dailyAvailable ? 'Claim now' : 'Claimed today';
                const dailyDisabled = !dailyAvailable;

                // Build html
                let html = `
                    <!-- Signup Bonus -->
                    <div class="bonus-item" data-type="signup">
                        <div class="bonus-left">
                            <div class="bonus-icon"><i class="fa-regular fa-star"></i></div>
                            <div class="bonus-info">
                                <h4>Signup Bonus</h4>
                                <div class="sub"><i class="fa-regular fa-id-card"></i> one-time · per ID</div>
                            </div>
                        </div>
                        <div class="bonus-status">
                            <span class="bonus-amount">1.00 <span class="unit">USDT</span></span>
                            <span class="status-badge ${signupStatus}">
                                ${signupClaimed ? '<i class="fa-regular fa-circle-check"></i> claimed' : '<i class="fa-regular fa-clock"></i> ready'}
                            </span>
                            <button class="claim-small-btn" id="claimSignupBtn" ${signupDisabled ? 'disabled' : ''}>
                                <span class="spinner"></span>
                                <span class="btn-label"><i class="fa-regular fa-hand"></i> ${signupLabel}</span>
                            </button>
                        </div>
                    </div>

                    <!-- Daily Bonus -->
                    <div class="bonus-item" data-type="daily">
                        <div class="bonus-left">
                            <div class="bonus-icon"><i class="fa-regular fa-calendar-plus"></i></div>
                            <div class="bonus-info">
                                <h4>Daily Bonus</h4>
                                <div class="sub"><i class="fa-regular fa-clock"></i> resets every day</div>
                            </div>
                        </div>
                        <div class="bonus-status">
                            <span class="bonus-amount">0.20 <span class="unit">USDT</span></span>
                            <span class="status-badge ${dailyStatus}">
                                ${dailyAvailable ? '<i class="fa-regular fa-clock"></i> ready' : '<i class="fa-regular fa-circle-check"></i> claimed today'}
                            </span>
                            <button class="claim-small-btn" id="claimDailyBtn" ${dailyDisabled ? 'disabled' : ''}>
                                <span class="spinner"></span>
                                <span class="btn-label"><i class="fa-regular fa-hand"></i> ${dailyLabel}</span>
                            </button>
                        </div>
                    </div>
                `;
                bonusGrid.innerHTML = html;

                // --- attach events ---
                // signup claim
                document.getElementById('claimSignupBtn')?.addEventListener('click', function(e) {
                    if (this.disabled || this.classList.contains('loading')) return;
                    claimBonus('signup', this);
                });

                // daily claim
                document.getElementById('claimDailyBtn')?.addEventListener('click', function(e) {
                    if (this.disabled || this.classList.contains('loading')) return;
                    claimBonus('daily', this);
                });
            }

            // --- claim logic ---
            function claimBonus(type, btnElement) {
                const isSignup = (type === 'signup');
                const amount = isSignup ? 1.00 : 0.20;
                const updateKey = isSignup ? 'signupClaimed' : 'dailyClaimed';
                const dateKey = isSignup ? null : 'dailyLastDate';

                // double-check state
                if (isSignup && signupClaimed) {
                    showToast('Signup bonus already claimed.', 'info');
                    return;
                }
                if (!isSignup) {
                    if (dailyClaimed && dailyLastDate === todayStr) {
                        showToast('Daily bonus already claimed today.', 'info');
                        return;
                    }
                }

                // loading
                btnElement.classList.add('loading');
                btnElement.disabled = true;

                const userRef = db.ref('users/' + currentUid);

                // prepare update
                let updateData = {};
                if (isSignup) {
                    updateData.signupClaimed = true;
                } else {
                    updateData.dailyClaimed = true;
                    updateData.dailyLastDate = todayStr;
                }

                // update balance
                userRef.update(updateData)
                .then(() => {
                    // update local state
                    if (isSignup) {
                        signupClaimed = true;
                    } else {
                        dailyClaimed = true;
                        dailyLastDate = todayStr;
                    }
                    // add to balance
                    return userRef.child('balance').transaction((currentBal) => {
                        if (currentBal === null) return amount;
                        return (parseFloat(currentBal) || 0) + amount;
                    });
                })
                .then(() => {
                    showToast(`Claimed ${amount.toFixed(2)} USDT (${type} bonus)`, 'success');
                    // re-render
                    renderBonuses();
                })
                .catch(err => {
                    showToast('Claim failed: ' + err.message, 'error');
                    btnElement.classList.remove('loading');
                    btnElement.disabled = false;
                });
            }

            // --- initial load ---
            loadUserData();

            // also listen for realtime updates (in case multiple tabs)
            db.ref('users/' + currentUid).on('value', (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    signupClaimed = data.signupClaimed || false;
                    dailyClaimed = data.dailyClaimed || false;
                    dailyLastDate = data.dailyLastDate || '';
                } else {
                    signupClaimed = false;
                    dailyClaimed = false;
                    dailyLastDate = '';
                }
                renderBonuses();
            });

        })();
    </script>
</body>
</html>
